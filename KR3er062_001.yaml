body:
  text: 卷上飲食勞倦門飲食所傷論陰陽應象論雲水谷之寒熱感則害人六腑痹論云陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺病則為喘咳為腫滿為水瀉輕則當發汗利小便使上下分消其濕解酲湯五苓散生薑半夏枳實白朮之類是也如重而蓄積為滿者芫花大戟甘遂牽牛之屬利下之此其治也食者物也有形之血也如生氣通天論云因而飽食筋脈橫解腸澼為痔又云食傷太陰厥陰寸口大於人迎兩倍三倍者或嘔吐或痞滿或下痢腸澼當分寒熱輕重而治之輕則內消重則除下如傷寒物者半夏神麯乾薑三稜廣朮巴豆之類主之如傷熱物者枳實白朮青皮陳皮麥蘖黃連大黃之類主之亦有宜吐者陰陽應象論云在上者因而越之瓜蒂散之屬主之然而不可過劑過劑則反傷腸胃蓋先因飲食自傷又加之以藥過故腸胃復傷而氣不能化食愈難消矣漸至羸困故五常政大論云大毒治病十去其六小毒治病十去其七凡毒治病不可過之此聖人之深戒也勞倦所傷論調經篇云陰虛生內熱岐伯曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通而胃氣熱熱氣熏胸中故內熱舉痛論云勞則氣耗勞則喘且汗出內外皆越故氣耗矣夫喜怒不節起居不時有所勞傷皆損其氣氣衰則火旺火旺則乘其脾土脾主四肢故困熱無氣以動懶於語言動作喘乏表熱自汗心煩不安當病之時宜安心靜坐以養其氣以甘寒瀉其熱火以酸味收其散氣以甘溫補其中氣經言勞者溫之損者溫之者是也金匱要略云平人脈大為勞脈極虛亦為勞矣夫勞之為病其脈浮大手足煩熱春夏劇秋冬瘥脈大者熱邪也極熱者氣損也春夏劇者時助邪也秋冬瘥者時勝邪也以黃耆建中湯治之此亦溫之之意也夫上古聖人飲食有節起居有常不妄作勞形與神俱百歲乃去此謂治未病也今時之人去聖人久遠則不然飲食失節起居失宜妄作勞役形氣俱傷故病而後藥之是治其已病也推其百病之源皆因飲食勞倦而胃氣元氣散解不能滋榮百脈灌溉臟腑衛護周身之所致也故蒼天之氣貴清靜陽氣惡煩勞噫飲食喜怒之間寒暑起居之際可不慎歟調中益氣湯治因飢飽勞役損傷脾胃元氣不足其脈弦洪緩而沉按之中之下得時一澀其證四肢滿悶肢節疼痛難以屈伸身體沉重煩心不安忽肥忽瘦四肢懶倦口失滋味腹難舒伸大小便清利而數或上飲下便或大便澀滯或夏月餐泄米穀不化或便後見血或便見白膿胸滿短氣咽膈不通痰唾稠黏口中沃沫食入反出耳鳴耳聾目中流火視物昏花胬肉紅絲熱壅頭目不得安臥不思飲食並皆治之橘皮如腹中氣不轉運加木香一分如無此證不加黃柏酒洗各二分升麻此一味為上氣不足胃氣與脾氣下流乃補上氣從陰引陽柴胡各三分人參有嗽者去之炙甘草蒼朮各五分黃耆一錢如時顯熱躁是下元陰火蒸蒸然發也加生地黃二分黃柏三分如大便虛坐不得或大便了而不了腹中常常逼迫皆是血虛血澀加當歸身三分無此證則去之如身體沉重雖小便數多亦加茯苓二分黃柏三分澤瀉五分蒼朮一錢時暫從權而去濕也不可常用兼足太陰已病其脈亦絡於心中故顯濕熱相合而生煩亂如胃氣不和加湯洗半夏五分生薑三片有嗽者加生薑生地黃二分以製半夏之毒如痰厥頭痛非半夏不能除此足大陰脾邪所作也如無以上證只服前藥上件銼如麻豆大都作一服水二大盞煎去渣稍熱食遠服之寧心絶慮靜坐少語藥必為效耳如夏月須加白芍藥三分如春月腹中痛尤宜加如惡熱而渴或腹痛者更加芍藥五分生黃芩二分如惡寒腹痛加中桂三分去黃芩謂之桂枝芍藥湯亦於前藥中加之如冬月腹痛不可用芍藥蓋大寒之藥也只加乾薑二分或加半夏五七分以生薑少許制之如秋冬之月胃脈四道為衝脈所逆脅下少陽脈二道而反上行名曰厥逆其證氣上衝咽不得息而喘息有音不得臥加吳茱萸五分至一錢湯洗去苦觀厥氣多少而用之亦於前藥中作一服服之如夏月有此證為大熱也此病隨四時為寒熱溫涼也宜以黃連酒洗黃柏酒浸知母酒浸各等分上為細末熟湯為丸如梧桐子大每服一百丸或二百丸白湯送下空心服仍多飲熱湯服畢少時便以美食壓之使不令胃中停留直至下元以瀉衝脈之邪也大抵治飲食勞倦所得之病乃虛勞七損證也常宜以甘溫平之甘多辛少是其治也寬中喜食無厭丸一名寬中進食丸資形氣喜飲食木香五分青皮人參乾薑各一錢炙甘草一錢五分白茯苓澤瀉檳榔橘皮白朮各二錢縮砂仁豬苓各二錢半半夏七錢枳實四錢草豆蔻仁五錢神麯五錢半炒大麥蘖面一兩炒上為細末湯浸蒸餅為丸如梧桐子大每服三五十丸米湯下食遠服交泰丸升陽氣瀉陰火調榮氣進飲食助精神寬腹脅除怠惰嗜臥四肢沉困不收乾薑炮製三分巴豆霜五分肉桂去皮搗一錢人參去蘆一錢柴胡去苗白朮小椒炒去汗子並閉目各一錢五分厚朴去皮炒三錢秋冬加七錢苦楝酒煮白茯苓縮砂仁各三錢知母四錢一半酒炒一半酒洗春夏用秋冬去川烏炮製去皮膚四錢五分吳茱萸湯洗七次五錢皂角水洗煨去皮弦紫菀去苗各六錢黃連去須七錢秋冬減一錢五分上除巴豆霜別研外同為極細末煉蜜為丸如梧桐子大每服十丸溫水送下食遠虛實加減木香人參生薑枳朮丸開胃進飲食乾生薑二錢五分木香三錢人參三錢五分陳皮四錢枳實一兩炒白朮一兩五錢上為細末荷葉裹燒飯為丸如梧桐子大每服三五十丸溫水下食前木香乾姜枳朮丸破除寒滯氣消寒飲食木香三錢乾薑五錢炮枳實一兩炒白朮一兩五錢上為細末荷葉裹燒飯為丸如梧桐子大每服三五十丸溫水送下食前扶脾丸治脾胃虛寒腹中痛溏瀉無度飲食不化乾生薑肉桂各五分乾薑藿香紅豆各一錢白朮茯苓橘皮烏梅肉訶子皮炙甘草半夏各二錢神麯炒大麥蘖炒各四錢上為細末荷葉燒飯為丸如梧桐子大每服五十丸白湯送下食前和中丸補胃進食人參乾生薑陳皮各一錢乾木瓜二錢炙甘草三錢上為細末湯浸蒸餅為丸如梧桐子大每服五十丸白湯送下食前檳榔丸破滯氣消飲食炙甘草一錢木香人參檳榔各二錢陳皮五錢上為細末湯浸蒸餅為丸如梧桐子大每服五十丸白湯下食前消積滯集香丸治傷生冷硬物不消京三稜廣朮青皮陳皮丁香皮益智川楝子茴香各一兩巴豆和皮米炒焦五錢上為細末醋糊為丸如緑豆大每服五七丸溫水生薑湯送下食前服黃耆湯補胃除濕和血益血滋養元氣木香氣通者去之藿香葉各一錢當歸酒洗陳皮各二錢人參澤瀉各五錢黃耆一兩上㕮咀每服五錢水二大盞煎至一盞如欲汗加生薑煎食遠熱服之黃耆當歸湯治熱上攻頭目沿身胸背發熱當歸身一錢酒洗黃耆五錢上㕮咀作一服水二大盞煎至一盞食前熱服參朮湯治脾胃虛弱元氣不足四肢沉重食後昏悶黃柏酒浸當歸各二分柴胡升麻各三分人參陳皮青皮各五分神麯末七分炙甘草蒼朮各一錢黃耆二錢上㕮咀都作一服水二大盞煎至一盞食遠服益智和中丸李秋合木香黃連生地黃各二分黃耆人參麥門冬神麯末當歸身乾生薑陳皮薑黃各五分縮砂仁七分桂花一錢桂枝一錢五分益智仁二錢二分炙甘草二錢五分麥蘖面三錢草豆蔻仁四錢上為細末湯浸蒸餅為丸如梧桐子大每服五十丸白湯下細嚼亦當益胃散治因服寒藥過多以致脾胃虛損胃脘疼痛人參甘草縮砂仁厚朴各二錢白豆蔻薑黃乾生薑澤瀉各三錢益智仁六錢黃耆陳皮各七錢上為粗末每服三錢水二盞生薑五片煎至一盞去相食前溫服脾胃虛損論易水張先生常戒不可峻利食藥下咽未至藥丸施化其標皮之力始開便言快也所傷之物已去若更待一兩時辰許藥盡化開其藥峻利必有情性病去之後脾胃既損是真氣元氣敗壞促人之壽當時設下一藥枳實一兩麩炒黃色為度白朮二兩隻此二味荷葉裹燒飯為丸以白朮甘溫甘溫補脾胃之元氣其苦味除胃中之濕熱利腰臍間血故先補脾胃之弱過於枳實克化之藥一倍枳實味苦寒泄心下之痞悶消化胃中所傷此一藥下胃其所傷不能即去須侍一兩時辰許食則消化是先補其虛而後化其所傷則不峻利矣當是之時未悟用荷葉燒飯為丸之理老年味之始得可謂奇矣荷葉之物中央空象震卦之體震者動也人感之生足少陽甲膽者風也生化萬物之根蒂也內經云履端於始序則不愆人之飲食入胃營氣上行即少陽甲膽之氣也其手少陽三焦經人之元氣也手足經同法便是少陽元氣生髮也胃氣穀氣元氣甲膽上升之氣一也異名雖多止是胃氣上升者也荷葉之體生於水土之下出於汙穢之中不為所染挺然獨立其色青形乃空青而象風木者也食藥感此氣之化胃氣何由不上升乎其主意用此一味為引用可謂遠識深慮合於道者也更以燒飯和藥與白朮協力滋養穀氣而補令胃厚再不至內傷其利廣矣大矣若內傷脾胃辛熱之物酒肉之類自覺不快覓藥於醫醫者亦不問所傷敷之集香丸小丁香丸巴豆大熱藥之類下之大便下則物去遺留食之熱性藥之熱性重傷元氣則七神不熾經云熱傷氣正謂此也其人必無氣以動而熱困四肢不舉傳變諸疾不可勝數使人真氣自此衰矣若傷生冷硬物世醫或用大黃牽牛二味大寒藥投之隨藥下所傷去矣遺留食之寒性藥之寒性重瀉其陽陽去則皮膚筋肉血脈無所依倚便為虛損之證論言及此令人寒心夫辛辣薄味之藥無故不可亂服非止牽牛而已至真要大論云五味入口各先逐其所喜攻攻者克伐瀉也辛味下咽先攻瀉肺之五氣氣者真氣元氣也其牽牛之辛辣猛烈傷人尤甚飲食所傷腸胃邪當以苦泄其腸胃可也肺與元氣何罪之有用牽牛大罪有五此其一也況胃主血所生病為物所傷物者有形之物也皆是血病瀉其氣其罪二也且飲食傷之於中焦止合克化消導其食重瀉上焦肺中已虛之氣其罪三也食傷腸胃當塞因塞用又曰塞因塞用枳實大黃苦寒之物以泄有形是也反以辛辣牽牛散瀉真氣大禁四也殊不知針經有云外來客邪風寒傷人五臟若誤瀉胃氣必死誤補亦死其死也無氣以動故靜若內傷腸胃而反瀉五臟必死誤補亦死其死也陰氣有餘故躁今內傷腸胃是謂六腑不足之病反瀉上焦虛無肺氣肺者五臟之一數也雖不即死若更旬日之間必暗損人壽數謂如人壽應百歲為牽牛之類朝損暮損其元氣消耗不得終其天年但人不覺耳將為天年已盡此乃暗裡折人壽數大禁五也故特著此論並方庶令四海聞而行之不至夭橫耳此老夫之用心也胃氣不可不養復明養胃之理內經雲安谷者昌絶谷者亡水去則榮散谷消則衛亡榮散衛亡神無所依仲景云水入於經其血乃成谷入於胃脈道乃行故血不可不養胃不可不溫血養胃溫榮衛將行常有天命谷者身之大柄也書與周禮皆云金木水火土谷惟修以奉養五臟者也內傷飲食固非細事苟妄服食藥而輕生殞命其可乎哉黃帝針經有說胃惡熱而喜清冷大腸惡清冷而喜熱兩者不和何以調之岐伯曰調此者食飲衣服亦欲適寒溫寒無悽愴暑無出汗飲食熱無灼灼寒無悽悽寒溫中適故氣將持乃不致邪僻也是必有因用豈可用俱寒俱熱之藥倉卒致損與以刃殺人者何異內經說內傷者其氣口脈反大於人迎一倍二倍三倍分經用藥又曰上部有脈下部無脈其人當吐不吐者死如但食不納噁心欲吐者不問一倍二倍不當正與瓜蒂散吐之但以指或以物探去之若所傷之物去不盡者更診其脈問其所傷以食藥去之以應塞因塞用又謂又寒因寒用泄而下降乃應太陰之用其中更加升發之藥令其元氣上升塞因通用因曲而為直何為曲內傷胃氣是也何為直因而升發胃氣是也因其飲食之內傷而使生氣增益胃氣完復此乃因曲而為之直也若分經用藥其所傷之物寒熱溫涼生硬柔軟所傷不一難立定一法只隨所傷之物不同各立治法臨時加減用之其用藥又當問病人從來稟氣盛衰所傷寒物熱物是喜食而食之耶不可服破氣藥若乘飢因而傷之耶當益胃氣或為人所勉勸強食之宜損血而益氣也診其脈候傷在何臟可與對病之藥豈可妄瀉天真元氣以輕喪身寶乎且如先食熱物而不傷繼之以寒物因後食致前食亦不消化而傷者當問熱食寒食孰多孰少斟酌與藥無不當矣喻如傷熱物二分寒物一分則當用寒藥二分熱藥一分相合而與之則榮衛之氣必得周流更有或先飲酒而後傷寒冷之食及傷熱食冷水與冰如此不等皆當驗其節次所傷之物酌量寒熱之劑分數各各對證與之無不取效自忖所定藥方未敢便謂能盡藥性之理姑用指迷辨惑三黃枳朮丸治傷肉濕面辛辣味厚之物填塞悶亂不快枳實麩炒五錢黃連去須酒洗大黃濕紙裹煨神麯炒橘皮白朮各一兩黃芩二兩上為極細末湯浸蒸餅為丸如緑豆一倍大每服五十丸白湯下臨時量所傷多少加減服之巴豆三稜丸一名木香見現丸治傷生冷硬物心腹滿悶疼痛巴豆霜五分木香二錢升麻柴胡各三錢草豆蔻麵裹煨熟用仁香附子炒各五錢神麯炒黃色石三稜去皮煨京三稜煨各一兩上為細末湯浸蒸餅為丸如緑豆一倍大每服一二十丸溫白湯下量所傷多少加減服之白朮丸治傷豆粉濕面油膩之物白礬枯三錢黃芩五錢橘皮七錢神麯炒黃色半夏湯洗七次白朮各一兩枳實麩炒黃色一兩一錢上為極細末湯浸蒸餅為丸如緑豆大每服三五十丸白湯下素食多用乾薑故加黃芩以瀉之草豆蔻丸治秋冬傷寒冷物胃脘當心而痛上肢兩脅咽膈不通炒鹽五分乾生薑青皮橘皮各二錢麥蘖面炒黃色生黃芩冬月不用半夏湯洗七次神麯炒各五錢草豆蔻麵裹煨去皮取仁白朮各一兩枳實麩炒二兩上為極細末湯浸蒸餅為丸如緑豆大每服五十丸白湯下中滿腹脹門中滿腹脹論六元政紀論云太陰所至為中滿太陰所至為蓄滿諸濕腫滿皆屬脾土論云脾乃陰中之太陰同濕土之化脾濕有餘腹滿食不化天為陽為熱主運化也地為陰為濕主長養也無陽則陰不能生化故云臟寒生滿病調經篇云因飲食勞倦損傷脾胃始受熱中未傳寒中皆由脾胃之氣虛弱不能運化精微而制水穀聚而不散而成脹滿經云腹滿腫脹支膈胠脅下厥上冒過在太陰陽明乃寒濕鬱過也脈經所謂胃中寒則脹滿者是也針經三卷雜病第八腹滿大便不利上走胸溢喘息喝喝然取足少陰又云脹取三陽三陽者足太陽寒水為脹與通評虛實論說腹暴滿按之不下取太陽經絡胃之募也正同取者瀉也經雲中滿者瀉之於內者是也宜以辛熱散之以苦瀉之淡滲利之使上下分消其濕正如開鬼門潔淨府溫衣繆刺其處是先瀉其血絡後調其真經氣血平陽布神清此治之正也或曰諸脹腹大皆屬於熱者何也此乃病機總辭假令外傷風寒有餘之邪自表傳裡寒變為熱而作胃實腹滿仲景以大承氣湯治之亦有膏粱之人濕熱鬱於內而成脹滿者此熱脹之謂也大抵寒脹多而熱脹少治之者宜詳辨之諸腹脹大皆屬於熱論諸腹脹大皆屬於熱此乃八益之邪有餘之證自天外而入是感風寒之邪傳裡寒變為熱作胃實曰晡潮熱大渴引飲譫語是太陽陽明並大實大滿者大承氣下之少陽陽明微滿實者小承氣下之泄之則脹已此之謂也假令痎瘧為脹滿亦有寒脹熱脹是天之邪氣傷暑而得之不即時發至秋暑氣衰絶而瘧病作矣知其寒也局方用交解飲子者是也內虛不足寒濕令人中滿及五臟六腑俱有脹滿更以脈家寒熱多少較之胃中寒則脹滿濁氣在上則生䐜脹脹取三陽三陽者足太陽膀胱寒水為脹腹暴滿按之不下取太陽經絡者胃之募也正同腹滿䐜脹肢膈胠脅下厥上冒過在太陰陽明胃中寒濕鬱遏也太陰䐜脹復不利不欲食食則嘔不得臥按所說寒脹之多如此中滿治法當開鬼門潔淨府開鬼門者謂發汗也潔淨府者利小便也中滿者瀉之於內謂脾胃有病當令上下分消其溫下焦如瀆氣血自然分化不待泄滓穢如或大實大滿大小便不利從權以寒熱藥下之或傷酒濕面及味厚之物膏粱之人或食已便臥使濕熱之氣不得施化致令腹脹滿此脹亦是熱脹治熱脹分消丸主之如或多食寒涼及脾胃久虛之人胃中寒則脹滿或藏寒生滿病以治寒脹中滿分消湯主之中滿分消丸治中滿熱脹鼓脹氣脹水脹此非寒脹類白朮人參炙甘草豬苓去黑皮薑黃各一錢白茯苓去皮乾生薑砂仁各二錢澤瀉橘皮各三錢知母炒四錢黃芩去腐炒夏用一兩二錢黃連淨炒半夏湯洗七次枳實炒各五錢厚朴薑製一兩上除茯苓澤瀉生薑外共為極細末入上三味和勻湯浸蒸餅為丸如梧桐子大每服一百丸焙熱白湯下食遠服量病人大小加減中滿分消湯治中滿寒脹寒疝大小便不通陰躁足不收四肢厥逆食入反出下虛中滿腹中寒心下痞下焦躁寒沉厥奔豚不收川烏澤瀉黃連人參青皮當歸生薑麻黃柴胡乾薑蓽澄茄各二分益智仁半夏茯苓木香升麻各三分黃耆吳茱萸厚朴草豆蔻仁黃柏各五分上銼如麻豆大都作一服水二大盞煎至一盞食前熱服忌房室酒濕面生冷及油膩等物廣朮潰堅湯治中滿腹脹內有積聚堅硬如石其形如盤令人不能坐臥大小便澀滯上喘氣促面色痿黃通身虛腫廣朮紅花吳茱萸升麻各二分半夏七分柴胡澤瀉神麯青皮陳皮各三分厚朴生用黃芩黃連益智仁草豆蔻仁五分生甘草三分當歸梢五分如渴加葛根四分上銼如麻豆大水二大盞煎至一盞稍熱服食遠忌酒醋濕面服二服之後中滿減半止有積不消再服後藥半夏厚朴湯紅花蘇木各半分吳茱萸乾生薑黃連各一分木香青皮各二分肉桂蒼朮白茯苓澤瀉柴胡生甘草生黃芩草豆蔻仁陳皮各三分京三稜豬苓當歸梢升麻各四分神麯六分厚朴八分半夏一錢桃仁七個昆布少許如渴加葛根三分上㕮咀作一服水三盞煎至一盞去渣稍熱服此藥二服之後前證又減一半卻於前藥中加減服之破滯氣湯一名木香化滯散破滯氣治心腹滿悶炙甘草四分白檀藿香陳皮大腹子白豆蔻仁白茯苓桔梗各五分砂仁人參青皮檳榔木香薑黃白朮各二錢上㕮咀每服三錢水二盞煎至一盞去渣溫服不拘時草豆蔻湯治腹中虛脹澤瀉一分木香三分半夏制四分枳實草豆蔻仁黃耆春夏去之益智甘草各五分青皮陳皮各六分茯苓當歸各七分神麯四分上為粗末都作一服水二大盞生薑三片煎至一盞去渣溫服冬月加黃耆五七分春夏止服正藥食遠心腹痞悶門消痞悶方治心下痞悶一切所傷及積年不愈者乾生薑神麯炒炙甘草各二分豬苓二錢五分澤瀉厚朴砂仁各三錢半夏湯洗七次陳皮人參各四錢枳實五炒黃連淨炒黃芩各六錢薑黃白朮各一兩上為細末湯浸𩚫餅為丸如梧桐子大每服五七十丸至百丸白湯送下食遠服失笑丸一名枳實消痞丸治右關脈弦心下虛痞惡食懶倦開胃進飲食乾生薑一錢炙甘草麥糵面白茯苓白朮各二錢半夏曲人參各三錢厚朴四錢炙枳實黃連各三錢上為細末湯浸𩚫餅為丸梧桐子大每服五七十丸白湯下食遠服黃連消痞丸治心下痞滿壅滯不散煩熱喘促不安澤瀉薑黃各一錢乾生薑二錢茯苓炙甘草白朮各三錢陳皮豬苓各五錢枳實七錢炒半夏九錢黃連一兩黃芩二兩炒上為細末湯浸𩚫餅為丸如梧桐子每服五十丸溫湯下食遠消痞湯一名木香化滯湯治因憂氣鬱結中脘腹皮里微痛心下痞滿不思飲食枳實炒當歸梢各二分陳皮生薑木香各三分柴胡四分炙甘草各五分紅花少許草豆蔻五分半夏一錢上為粗末作一服水二盞生薑三片煎至一盞食遠服忌酒濕面葶藶丸一名人參順氣飲子治心下痞胸中不利半夏洗厚朴炙石膏青皮各五分當歸身七分白豆蔻仁縮砂茵陳酒製乾葛各一錢炙甘草羌活黃芩一半酒洗一半炒苦葶藶酒洗炒人參柴胡獨活各三錢上為細末湯浸𩚫餅和勻篩子內擦如米大每服二錢臨臥用一口湯下胃脘痛門草豆蔻丸治脾胃虛弱而心火乘之不能滋榮上焦元氣遇冬腎與膀胱寒水旺時子能令母實以致肺金大腸相輔而來克心乘脾胃此大復仇也經云大勝必大復理之常也故皮毛血脈分肉之間元氣已絶於外又大寒大燥二氣並乘之則苦惡風寒耳鳴及腰背相引而痛鼻息不通不聞香臭額寒腦痛大惡風寒目時眩不欲開腹中為寒水反乘痰唾沃沫食則反出腹中常痛心胃作痛脅下縮急有時而痛腹不能努大便多瀉而少祕下氣不絶或腹中鳴此脾胃虛之至極也胸中氣亂心煩不安而為霍亂之漸咽膈不通極則噎塞有聲喘喝閉塞或於日陽處或於暖室中少緩口吸風寒之氣則復作四肢厥逆身體沉重不能轉側頭不可以回顧小便溲而時躁此藥主之秋冬寒涼大復氣之藥也神麯末柴胡詳脅下痛多少用之薑黃各四分當歸身青皮各六分黃耆人參益智仁吳茱萸湯洗焙乾陳皮白殭蠶各八分澤瀉小便數減半半夏各一錢洗甘草生六分熟六分麥糵面一錢五分炒草豆蔻仁麵裹燒熟為度一錢四分桃仁七個湯浸去皮尖上除桃仁別研如泥余為細末同研勻湯浸𩚫餅為丸如梧桐子大每服五七十丸白湯下食遠服神聖復氣湯治復氣乘冬足太陽寒水足少陰腎水之旺子能令母實手太陰肺實反來剋土火木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻中流濁涕不止或如瘜肉不聞香臭咳嗽痰沫上熱如火下寒如冰頭作陳痛目中溜火視物䀮䀮耳聾耳鳴頭並口鼻大惡風寒喜日晴暖夜臥不安常覺痰塞咽膈不通口不知味兩脅縮急而痛牙齒動搖不能嚼物臍腹之間及尻臀足膝不時寒冷前陰冷而多汗行步欹側起居艱難麻木風痹小便數氣短喘喝少氣不足以息遺失無度及婦人白帶陰戶中大痛牽心面色黧黑男子控睪痛牽心腹或面色如赭食少大小便不調煩心霍亂逆氣裡急腹不能努或腸鳴膝下筋急肩脾大痛此皆寒水來復火土之仇也乾薑炮黑附子炮各三分防風人參郁李仁另研各五分半夏湯洗研升麻各七分藁本甘草各八分當歸身六分酒洗柴胡羌活各一錢白葵花五朵去心剪碎上件都作一服水五大盞煎至二盞入黃耆一錢橘紅五分草豆蔻仁一錢麵裹煨熟去皮一錢同煎至一盞再入下項藥黃柏三分酒浸黃連三分酒浸枳殼三分生地黃三分酒洗此四味預一日另用新水浸又以華細辛二分川芎細末三分蔓荊子三分作一處浸此三味並黃柏等煎正藥作一大盞不去渣入此所浸之藥再上火同煎至一大盞去渣熱服空心又能治齧頰齧唇舌舌根強硬等證如神忌肉湯及食肉不使助經絡中火邪也大抵腎元與膀胱經中有寒氣不足者並宜服之於月生月滿時食隔三五日一服如病急不拘時候麻黃豆蔻丸治客寒犯胃心胃大痛不可忍木香青皮紅花厚朴各二分蘇木三分蓽澄茄四分升麻半夏湯洗麥糵面縮砂仁黃耆白朮陳皮去白柴胡炙甘草吳茱萸當歸身各五分益智仁八分神麯末二錢炒麻黃不去節三錢草豆蔻仁五錢上為細末湯浸𩚫餅為丸如梧桐子大每服五十丸白湯下或細嚼湯下亦可酒客病論論酒大熱有毒氣味俱陽乃無形之物也若傷之則止當發散汗出則愈矣此最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有今之酒病者往往服酒症丸大熱之藥下之又有牽牛大黃下之是無形元氣受病反下有形陰血乖誤甚矣酒性大熱已傷元氣而復重瀉之況亦損腎水真陰及有形陰血俱為不足如此則陰血愈虛真水愈弱陽毒之熱大旺反增其陰火是謂元氣消亡十神何依折人長命雖不即死而虛損之病成矣金匱要略云酒疸下之久久為黑疸慎不可犯此戒不若令上下分消其濕當以葛花解酲湯主之葛花解酲湯木香五分人參去蘆豬苓去黑皮白茯苓橘皮各一錢五分白朮乾生薑神麯炒澤瀉各二錢蓮花青皮三錢縮砂仁白豆蔻仁葛花各五錢上為極細末和勻每服三錢七白湯調下但得微汗酒病去矣此蓋不得已而用豈可恃賴日日飲酒此藥氣味辛辣偶因酒病服之則不損元氣何者敵酒病故也若頻服之損人天命枳朮丸治痞消食強胃枳實麩炒黃色一兩白朮二兩上為極細末荷葉裹燒飯為丸如緑豆一倍大每服五十丸白湯下不拘時候量所傷多少加減服之半夏枳朮丸治因冷物內傷半夏湯洗七次一兩枳實麩炒黃色白朮各二兩上三味為極細末荷葉裹燒炊飯為丸如緑豆一倍大每服五十丸白湯下量所傷加減服之橘皮枳朮丸治元氣虛弱飲食不消或臟腑不調心下痞悶橘皮枳實麩炒黃色各一兩白朮二兩上為極細末荷葉裹燒飯為丸如緑豆一倍大每服五十丸白湯下量所傷加減服之除濕益氣丸治傷濕面心腹滿悶肢體沉重紅花三分蘿蔔子炒熟五錢枳實麩炒黃色黃芩生用神麯炒黃色白朮各一兩上同為細末荷葉裹燒飯為丸如緑豆一倍大每服五十丸白湯下量所傷加減服之除濕散治傷馬奶子並牛羊酪水一切冷物甘草炙紅花各二錢半夏湯洗七次三錢茯苓七錢乾生薑三錢車前子澤瀉各五錢神麯炒黃一兩上為極細末每服三錢匕白湯調下食前升麻黃連丸治多食肉口臭不欲聞其穢惡氣使左右不得近白檀二錢生甘草三錢生薑取自然汁升麻五錢蓮花青皮五錢黃連去須一兩黃芩去腐酒洗二兩上為極細末湯浸𩚫餅為丸如彈子大每服一丸細嚼白湯下食後上二黃丸治傷熱食痞悶兀兀欲吐煩亂不安甘草二錢升麻柴胡各三錢黃連酒洗一兩黃芩二兩一方加枳實五錢上為細末湯浸𩚫餅為丸如緑豆大每服五十丸白湯下食遠治傷冷飲者以五苓散每服二錢三錢匕加生薑煎服之治傷食兼傷冷飲者煎五苓散送半夏枳朮丸治傷冷飲不惡寒者腹中亦不覺寒惟覺悶身重食不化者或小便不利煎去桂五苓散依前斟酌服之瓜蒂散上部有脈下部無脈其人當吐不吐者死何謂下部無脈此謂木鬱也飲食過飽填塞胸中胸中者太陰之分野經曰氣口反大於人迎三倍食傷太陰故曰木鬱則達之吐者是也瓜蒂赤小豆各等分上二味為極細末每服二錢匕溫漿水調下取吐為度若不至兩手尺脈絶無不宜便用此藥恐損元氣令人胃氣不復若止是胸中窒塞悶亂不通以指探去之如不得吐者以物探去之得吐則已如食不去用此藥吐之解云盛食填塞於胸中為之窒塞兩寸脈當主事兩尺脈不見其理安在胸中有食故以吐出之食者物也物者坤土也是足太陰之號也胸中者肺也為物所填肺者手太陰金也金主殺伐也與坤土俱在於上而旺於天金能剋木故肝木生髮之氣伏於地下非木鬱而何吐去上焦陰土之物木得舒暢則鬱結去矣食塞於上脈絶於下若不明天地之道無由達此至理水火者陰陽之徵兆天地之別名也故曰獨陽不生獨陰不長天之用在於地下則萬物生長矣地之用在於天上則萬物收藏矣此乃天地交而萬物通也此天地相根之道也故陽火之根本於地下陰水之源本於天上故曰水出高源故人五臟主有形之物物者陰也陰者水也右三部脈主之偏見於寸口食塞其二是絶五臟之源源絶則水不下流兩尺竭絶此其理也何疑之有假令所傷前後不同以分為率傷熱物二分傷生冷硬物一分用寒藥三黃丸二停熱藥巴豆三稜丸一停合而服之如熱物傷少而寒物傷多則寒藥少而熱藥多也假令夏月大熱之時傷生冷硬物當用熱藥巴豆三稜丸治之須加三黃丸謂天時不可伐故加寒藥以順時令若熱物只用三黃丸何謂此三黃丸時藥也假令冬天大寒之時傷羊肉濕面等熱物當用三黃丸治之須加熱藥少許草豆蔻丸之類是也為引用又為時藥經云必先歲氣無伐天和此之謂也余皆仿此消渴門消渴論陰陽別論云二陽結謂之消脈要精微論云疸成為消中夫二陽者陽明也手陽明大腸主津病消則目黃口乾是津不足也足陽明胃主血熱則消穀善飢血中伏火乃血不足也結者津液不足結而不潤皆燥熱為病也此因數食甘美而多肥故其氣上溢轉為消渴治之以蘭除陳氣也不可服膏粱芳草石藥其氣剽悍能助燥熱也越人云邪在六腑則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣陽脈大盛則陰氣不得榮也故皮膚肌肉消削是也經云凡治消疸僕系偏枯痿厥氣滿發逆肥貴人則膏粱之疾也岐伯曰脈實病久可治脈弦小病久不可治後分為三消高消者舌上赤裂大渴引飲逆調論云心移熱於肺傳於膈消者是也以白虎加人參湯治之中消者善食而瘦自汗大便硬小便數叔和云口乾飲水多食亦肌虛疸成消中者是也以調胃承氣三黃丸治之下消者煩躁引飲耳輪焦乾小便如膏叔和云焦煩水易虧此腎消也以六味地黃丸治之總録所謂末傳能食者必發腦疽背瘡不能食者必傳中滿鼓脹皆謂不治之證潔古老人分而治之能食而渴者白虎加人參湯不能食而渴者錢氏方白朮散倍加葛根治之上中既平不復傳下消矣前人用藥厥有旨哉或曰未傳瘡疽者何也此火邪勝也其瘡痛甚而不潰或赤水者是也經云有形而不痛陽之類也急攻其陽無攻其陰治在下焦元氣得強者生失強者死未傳中滿者何也以寒治熱雖方士不能廢其繩墨而更其道也然臟腑有遠近心肺位近宜制小其服腎肝位遠宜制大其服皆適其至所為故知過與不及皆誅罰無過之地也如高消中消制之太急速過病所久而成中滿之病正謂上熱未除中寒復生者也非藥之罪失其緩急之制也處方之制宜加意焉和血益氣湯治口乾舌乾小便數舌上赤脈此藥生津液除乾燥生肌肉柴胡炙甘草生甘草此味治口乾舌乾也麻黃根各三分酒當歸梢四分酒知母酒漢防己羌活各五分酒生地黃七分升麻一錢杏仁桃仁各六個紅花少許酒黃連八分治舌上赤脈也石膏六分治小便赤色酒黃柏一錢上㕮咀都作一服水二大盞煎至一盞去渣溫服忌熱濕面酒醋等物當歸潤燥湯治消渴大便閉澀乾燥結硬兼喜溫飲陰頭退縮舌燥口乾眼澀難開及於黑處見浮雲細辛一分生甘草炙甘草各三分柴胡七分熟地黃三分黃柏知母石膏桃仁泥子當歸身麻子仁防風荊芥穗各一錢升麻一錢五分紅花少許杏仁六個小椒三個上㕮咀都作一服水二大盞煎至一盞去渣熱服食遠忌辛熱物生津甘露湯一名清涼飲子治消中能食而瘦口舌乾自汗大便結燥小便頻數升麻四分防風生甘草漢防己生地黃各五分當歸身六分柴胡羌活炙甘草酒黃芩酒知母黃芩各一錢石膏酒龍膽草黃柏各一錢五分紅花少許桃仁五個杏仁十個上㕮咀都作一服水二盞酒一匙煎至一盞稍熱服食遠辛潤緩肌湯一名清神補氣湯前消渴證才愈止有口乾腹不能努此藥主之生地黃細辛各一分熟地黃三分石膏四分黃柏酒製黃連酒製生甘草知母各五分柴胡七分當歸身荊芥穗桃仁防風各一錢升麻一錢五分紅花少許杏仁六個小椒二個上㕮咀都作一服水二大盞煎至一盞食遠稍熱服之甘草石膏湯渴病久愈又添舌白滑微腫咽喉咽津覺痛嗌腫時時有渴喜冷飲口中白沫如膠生地黃細辛各一分熟地黃黃連各三分甘草五分石膏六分柴胡七分黃柏知母當歸身桃仁炒去皮尖荊芥穗防風各一錢升麻一錢五分紅花少許杏仁六個小椒二個上如麻豆大都作一服水二盞煎至一盞食後溫服甘露膏一名蘭香飲子治消渴飲水極甚善食而瘦自汗大便結燥小便頻數半夏二分湯洗熟甘草白豆蔻仁人參蘭香升麻連翹桔梗各五分生甘草防風各一錢酒知母一錢五分石膏三錢上為極細末湯浸𩚫餅和勻成劑捻作薄片子日中曬半乾擦碎如米大每服二錢淡生薑湯送下食後生津甘露飲子治消渴上下齒皆麻舌根強硬腫痛食不能下時有腹脹或瀉黃如糜名曰餐泄渾身色黃目睛黃甚四肢痿弱前陰如冰尻臀腰背寒面生黧色脅下急痛善嚏喜怒健忘藿香二分柴胡黃連木香各三分白葵花麥門冬當歸身蘭香各五分蓽澄茄生甘草山梔子白豆蔻仁白芷連翹薑黃各一錢石膏一錢二分全蠍二個去毒炙甘草酒知母升麻人參各二錢桔梗三錢杏仁去皮酒黃柏各一錢五分上為細末湯浸𩚫餅和勻成劑捻作片子日中曬半乾擦碎如黃米大每服二錢津唾下或白湯送下食遠服眼耳鼻門諸脈者皆屬於目論陰陽應象論云諸脈者皆屬於目目得血而能視五臟六腑精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精則為約束里擷筋骨血氣之精而與脈併為繫上屬於腦後出於項中故邪中於項因逢其身之虛其入深則即隨眼系入於腦則腦轉腦轉則引目系急目系急則目眩以轉矣邪中其精其精所中不相比也則精散精散則視岐故見兩物目者五臟六腑之精榮衛魂魄之所常營也神氣之所主也故神勞則魂魄散志意亂是故瞳子黑眼發於陰白眼赤脈發於陽故陰陽合傳而為精明也目者心之使也心者神之舍也故神精亂而不轉卒然見非常之處精神魂魄散不相得故曰惑也夫十二經脈三百六十五絡其血氣皆上走於面而走空竅其清陽氣上散於目而為精其氣走於耳而為聽因心事煩冗飲食失節勞役過度致脾胃虛弱心火大盛則百脈沸騰血脈逆行邪害空竅天明則日月不明矣夫五臟六腑之精氣皆稟受於脾上貫於目脾者諸陰之首也目者血脈之宗也故脾虛則五臟之精氣皆失所司不能歸明於目矣心者君火也主人之神宜靜而安相火化行其令相火者包絡也主百脈皆榮於目既勞役運動勢乃妄行又因邪氣所並而損血脈故諸病生焉凡醫者不理脾胃及養血安神治標不治本是不明正理也內障眼論凡心包絡之脈出於心中以代心君之行事也與少陽為表裡瞳子散大者少陰心之脈挾目系厥陰肝之脈連目繫心主火肝主木此木火之勢盛也其味則宜苦宜酸宜涼大忌辛辣熱物以助木火之邪也飲食中常知此理可也夫辛主散熱則助火故不可食諸酸主收心氣瀉木火也諸苦瀉火熱則益水也尤忌食冷水大寒之物此則能損胃氣不行則元氣不生元氣不生胃氣下流胸中三焦之火及心火乘於肺上入腦灼髓火主散溢瞳子開大大熱之物又助火邪此蓋不可食驗也藥中雲茺蔚子一味辛及主益睛辛者是助火也故去之乃加黃芩黃連瀉中焦之火芩能瀉上焦肺中之火以酒洗之乃寒因熱用也又去青葙子為助陽火也加五味子以收瞳人間大且火之與氣勢不兩立故內經曰壯火食氣氣食少火少火生氣壯火散氣諸酸之物能助元氣孫真人云五月常服五味助五臟氣以補西方肺金法云以酸補之以辛瀉之辛瀉氣則明矣或曰藥中有當歸其味亦辛而甘其不去者何此辛甘一味以其和血之聖藥況有甘味又欲以為嚮導為諸藥之使耳芎辛湯治兩眼晝夜隱澀難開羞明惡日視物昏暗赤腫而痛細辛二分芎藭蔓荊子各五分甘草白芷各一錢防風一錢五分上㕮咀都作一服水二盞煎至一盞臨臥溫服碧天丸一名井珠丸治目疾纍服寒涼藥不愈兩眼蒸熱如火之熏赤而不痛滿目紅絲血脈貫睛瞀悶昏暗羞明畏日或上下瞼赤爛或冒風沙而內外眥皆破洗之神效枯白礬二分銅緑七分研瓦粉炒黑一兩上先研白礬銅研令細旋旋入粉同研勻熟水和之共為一百丸每用一丸熱湯半盞浸一二個時辰洗至覺微澀為度合半時辰許臨臥洗之瞑目便睡一丸可洗十遍再用湯內坐令熱此藥治其標若裡實者不宜用廣大重明湯治兩目瞼赤爛熱腫疼痛並稍赤及眼瞼癢痛抓之至破眼楞生瘡目多眵淚隱澀難開龍膽草防風生甘草細辛各一錢上銼如咀內甘草不銼只作一折先以水一大碗半煎龍膽一味至一半再入餘三味煎至少半碗濾去渣用清帶熱洗以重湯坐令熱日用五七次但洗畢閣眼一時去胬肉泛長及癢亦驗百點膏張濟氏眼病翳六年以至遮瞳人視物不明有云氣之狀因用此藥而效蕤仁去皮尖三分當歸身甘草各六分防風八分黃連揀淨二錢銼如麻豆大水一大碗煎至少半入藥上件銼如麻豆大蕤仁別研如泥同熬滴在水中不散入去沫蜜少許再熬少時為度令病人心靜點之至目中微痛日用五七次臨臥點尤疾效名之曰百點膏但欲多點使藥力相繼也選奇湯治眉骨痛不可忍炙甘草夏月生用羌活防風各三錢酒黃芩一錢冬月不用此一味如能食熱痛倍加之上㕮咀每服五錢水二盞煎至一盞去渣食後服之神效明目湯治眼櫺緊急致倒睫拳毛及上下瞼昏赤爛睛疼昏暗晝則冷淚常流夜則眼澀難開細辛二分蔓荊子五分防風一錢葛根一錢五分甘草二錢一方加黃耆一錢上㕮咀作一服水二盞煎至一盞去渣稍熱臨臥服羌活點翳膏一名復明膏治足太陽寒水膜子遮睛白翳在上視物不明藁本漢防己各二分黃連防風麻黃去根節柴胡升麻生地各三分羌活七分生甘草四分當歸身六分蕤仁六個椒樹東南根二分西北根二分上用淨水一大碗先煎漢防己黃連生甘草當歸生地黃煎至一半下余藥再煎至一盞去渣入銀石器中再熬之有力為度明目細辛湯治兩目發赤微痛羞明畏日怯風寒怕火眼睫成紐眵糊多隱澀難開眉攢腫悶鼻塞涕唾稠黏大便微硬川芎五分生地黃酒製蔓荊子各六分當歸梢白茯苓藁本各一錢荊芥一錢二分防風二錢麻黃根羌活各三錢細辛少許紅花少許椒八個桃仁二十個上㕮咀分作四服每服水二盞煎至一盞去渣稍熱臨臥服之忌酒醋濕面復明散治內瘴青皮三分橘皮川芎蒼朮各五分炙甘草生地黃連翹柴胡各一錢黃耆一錢五分當歸身二錢上銼如麻豆大都作一服水二大盞煎至一盞去渣稍熱服之食後忌酒醋濕面辛熱大料物之類助陽和血湯治眼發之後微有上熱白睛紅隱澀難開睡多眵淚蔓荊子二分香白芷三分柴胡黃耆炙甘草當歸身酒洗防風各五分升麻七分上㕮咀都作一服水一盞半煎至八分去渣稍熱服臨臥避風寒處睡吹雲膏治目中淚及迎風寒泣羞明畏日常欲閉目喜在暗室塞其戶牖翳膜歲久遮晴此藥多點神驗細辛一分升麻蕤仁各三分青皮連翹防風各四分柴胡五分生甘草當歸身各六分生地黃一錢五分楝黃連三錢荊芥穗一錢微取濃汁上㕮咀除連翹外用澄清淨水二碗先熬余藥至半碗入連翹同熬至一大盞許去渣入銀石器內文武火熬滴入水成珠不散為度入煉去沫熟蜜少許熬勻用之防風飲子治倒睫拳毛細辛蔓荊子各三分葛根防風各五分當歸身七分半炙甘草黃連人參各一錢上銼如麻豆大都作一服水二盞煎至一盞食遠服避風寒撥雲湯戊申六月徐總管患眼疾於上眼皮下出黑白翳兩個隱澀難開兩目緊縮而無疼痛兩手寸脈細緊按之洪大無力知足太陽膀胱為命門相火煎熬逆行作寒水翳及寒膜遮晴證呵缺善悲健忘嚏噴眵淚時自淚下面赤而白能食不大便小便數而缺氣上而喘黃耆一分細辛生薑葛根川芎各五分柴胡七分荊芥穗藁本生甘草升麻當歸身知母各一錢羌活防風黃柏各一錢五分上㕮咀如麻豆大都作一服水二盞煎至一盞去渣熱服食後神效黃耆湯治渾身麻木不仁或頭面手足肘背或腿腳麻木不仁並皆治之如兩目緊急縮小及羞明畏日隱澀難開或視物無力晴痛昏花手不得近或目少精光或目中熱如火服五六次可效蔓荊子一錢陳皮去白五錢人參八錢炙甘草白芍藥各一兩黃耆二兩上㕮咀每服五錢水二盞煎至一盞去渣臨臥稍熱服如小便淋澀加澤瀉五分一服去則止如有大熱證每服加酒洗黃柏三分如麻木不仁雖有熱不用黃柏止加黃耆一兩通用三兩也如眼縮急去芍藥忌酒醋面大料物蔥韭蒜辛物如麻木甚者加芍藥一兩通用二兩圓明內障升麻湯一名沖和養胃湯治內障眼得之脾胃元氣衰弱心火與三焦俱盛飲食不節形體勞役心不得休息故上為此疾乾薑一錢五味子二錢白茯苓三錢防風五錢白芍藥六錢柴胡七錢人參炙甘草當歸身酒洗白朮升麻葛根各一兩黃耆羌活各一兩五錢上㕮咀每服五七錢水三大盞煎至二大盞入黃芩黃連各二錢同煎數沸去渣煎至一盞熱服食遠黃芩黃連湯黃芩酒洗炒黃連酒洗炒龍膽草酒洗四次炒四次生地黃酒洗各一兩上㕮咀每服二錢水二盞煎至一盞去渣熱服蔓荊子湯治勞役飲食不節內障眼病此方如神效蔓荊子二錢五分黃柏酒拌炒四遍白芍藥各三錢炙甘草八錢黃耆各一兩人參各一兩上㕮咀每服三錢或五錢水二盞煎至一盞去渣臨臥溫服歸葵湯一名連翹飲子治目中溜火惡日與火隱澀難開小角緊視物昏花迎風有淚柴胡二分生甘草蔓荊子連翹生地黃當歸身紅葵花人參各三分黃耆酒黃芩防風羌活各五分升麻一錢上㕮咀每服五錢水二盞煎至一盞去渣食後溫服救苦湯治眼暴發赤腫臉高苦疼不任者桔梗連翹紅花細辛各一分當歸身夏月減半炙甘草各五分龍膽草蒼朮各七分黃連羌活太陽升麻陽明柴胡少陽防風藁本各一錢知母生地黃黃柏黃芩各一錢五分川芎三錢上㕮咀每服一兩水二盞煎至一盞去渣食後溫服若苦疼則多用苦寒者兼治本經之藥再行加減如睛昏加知母黃柏一倍熟乾地黃丸治血弱陰虛不能養心致心火旺陽火甚瞳子散大少陰為火君主無為不行其令相火代之兼心包絡之脈出心系分為三道少陽相火之體無形其用在其中矣火盛則令母實乙木肝旺是也心之脈挾於目系肝連目系況手足少陽之脈同出耳中至耳上角斜起於目外眥風熱之盛亦從此道而來上攻頭目致偏頭腫悶瞳子散大視物則花此由血虛陰弱故也法當養血涼血益血收火之散大除風之熱則愈矣人參二錢炙甘草天門冬湯洗去心地骨皮五味子枳殼炒黃連各三錢黃芩當歸身酒洗焙乾各五錢柴胡八錢熟乾地黃一兩生地黃酒洗七錢五分上件同為細末煉蜜為丸如梧桐子大每服一百丸茶湯送下食後日進二服益陰腎氣丸此壯水之主以鎮陽光澤瀉茯苓各二錢五分生地黃酒洗干牡丹皮山茱萸當歸梢酒洗五味子乾山藥柴胡各五錢熟地黃二兩上為細末煉蜜為丸如梧桐子大硃砂為衣每服五十丸淡鹽湯下空心羌活退翳丸治內障右眼小眥青白翳大眥微顯白翳腦痛瞳子散大上熱惡熱大便祕澀小便如常遇天氣暄熱頭痛睛脹可服此藥翳在大眥加葛根升麻翳在小眥加柴胡羌活是也黑附子炮寒水石各一錢酒防己二錢知母酒炒牡丹皮羌活川芎各三錢酒黃柏生地黃酒洗炒丹參茺蔚子酒當歸身柴胡各五錢熟地黃八錢芍藥一兩三錢上為細末煉蜜為丸如梧桐子大每服五七十丸白湯下空心宿食未消待飢則服之藥後省語言以食壓之當歸龍膽湯治眼中白翳防風石膏各一錢五分柴胡羌活五味子升麻各二錢甘草酒黃連黃耆各三錢酒黃芩炒酒黃柏炒芍藥當歸身草龍膽酒洗各五錢上㕮咀每服五錢水二盞煎至一盞去渣入酒少許臨臥熱服忌言語補陽湯治陽不勝其陰乃陰盛陽虛則九竅不通令青白翳見於大眥及足太陽少陰經中郁遏足厥陰肝經氣不得上通於目故青白翳內阻也當於太陽少陰經中九原之下以益肝中陽氣衝天上行此乃先補其陽後於足太陽太陰標中標者頭也瀉足厥陰肝經火下伏於陽中乃次治也內經云陰盛陽虛則當先補其陽後瀉其陰此治法是也每日清晨以腹中無宿食服補陽湯臨臥服瀉陰丸若天色變經大寒大風並勞役預日飲食不調精神不足或氣弱俱不可服待體氣和平天氣如常服之先補其陽使陽氣上升通於肝經之末利空竅於目矣肉桂一錢去皮知母炒當歸身酒洗生地黃酒炒白茯苓澤瀉陳皮各三錢白芍藥防風各五錢黃耆人參白朮羌活獨活熟地黃甘草各一兩柴胡二兩上㕮咀每服五錢水二盞煎至一大盞去渣空心服之瀉陰火丸一名連柏益陰丸五味子羌活獨活甘草當歸梢防風各五錢草決明細黃芩黃連酒炒黃柏知母各一兩石決明三錢炒存性上為細末煉蜜為丸如緑豆大每服五十丸至一百丸茶清下常多服補陽湯少服此藥多則妨飲食升陽柴胡湯肉桂五分柴胡去苗一錢五分防風白茯苓澤瀉陳皮各一錢生地黃酒炒楮實酒炒微潤黃耆人參白朮各五錢甘草梢當歸身羌活熟地黃獨活白芍藥各一兩知母酒炒如大者加作五錢上銼每服五錢水二盞煎至一盞去渣稍熱食遠服別合一料煉蜜為丸如梧桐子大每服五十丸茶清下每日與前藥各一服食遠不可飽服如天氣熱加五味子三錢天門冬去心芍藥楮實各五錢溫衛湯治鼻不聞香臭目中流火氣寒血熱冷淚多臍下冷陰汗足痿弱陳皮青皮黃連木香各三分人參甘草炙白芷防風黃柏澤瀉各五分黃耆蒼朮升麻知母柴胡羌活各一錢當歸身一錢五分上都作一服水二盞煎至一盞去渣食遠服之圓明膏治勞心過度飲食失節乃生內障及瞳子散大此方收晴圓明訶子皮濕紙裹煨甘草各二錢當歸身三錢柴胡生地黃麻黃去節搗開黃連各五錢上七味先以水二碗煎麻黃至一碗掠去沫外六味各㕮咀如豆大篩去末入在內同熬滴水中不散為度入熟蜜少許再熬勤點眼㗜藥麻黃散治內外障眼麻黃一兩當歸身一錢上二味同為粗末炒黑色入麝香乳香少許共為細末含水鼻內㗜之療本滋腎丸黃柏酒炒知母酒炒以上各等分上為細末滴水為丸如梧桐子大每服一百丸至一百五十丸空心鹽白湯下加味滋腎丸肉桂三分黃連一錢薑黃一錢五分苦參三錢苦葶藶酒洗炒石膏覺肚冷勿用黃柏酒炒知母酒炒各五錢上為極細末打薄麵糊為丸如梧桐子大每服一百丸空心服白湯下食壓之退翳膏治黑白翳蕤仁升麻各三分連翹防風青皮各四分甘草柴胡各五分當歸身六分黃連三錢生地黃一錢五分荊芥穗一錢水半盞別浸用上用水一碗入前藥煎至半碗去渣更上火煎至半盞入荊芥水兩匙入蜜少許再上火熬勻點之龍膽飲子治疳眼流膿主疳翳濕熱為病穀精草川鬱金蛇蛻皮炙甘草各五分升麻二錢麻黃一錢五分青蛤粉草龍膽黃芩炒羌活各三錢上為細末每服二錢食後溫茶清調服之柴胡聰耳湯治耳中乾結耳鳴耳聾連翹四錢柴胡三錢炙甘草當歸身人參各一錢水蛭五分炒別研麝香少許另研虻蟲三個去翅足炒另研上除三味別研外生薑三片水二大盞煎至一盞去渣再下三味上火煎一二沸稍熱服食遠羌活退翳湯治太陽寒水翳膜遮睛不能視物羌活一兩五錢防風一兩酒生地黃一錢薄荷葉藁本各七錢酒知母五錢黃柏四錢川芎當歸身三錢小椒五分細辛少許麻黃二錢用根荊芥穗煎成藥加之上㕮咀每服三錢水二大盞煎至一盞半入荊芥穗再煎至一盞去渣稍熱服食遠忌酒醋濕面等物遠睛紫金丹治目眶歲久赤爛俗呼為赤瞎是也當以三稜針刺目眶外以瀉濕熱如眼生倒睫拳毛兩目緊蓋內伏火熱而攻陰氣法當去其熱內火邪眼皮緩則毛立出翳膜亦退用手法攀出內瞼向外以針刺之出血白沙蜜二十兩黃丹六兩水飛南乳香當歸各三錢烏魚骨二錢麝香一錢白丁香直者五分輕粉一字甘石十兩燒七遍碎連水浸拌楝連三兩小便浸碎為末硇砂一錢小盞內放於瓶口上熏干上將白沙蜜於沙石器內慢火去沫下甘石次下丹以柳枝攪次下余藥以黏手為度作丸如雞頭大每用一丸溫水化開洗麗澤通氣湯治鼻不聞香臭黃耆四錢蒼朮羌活獨活升麻葛根防風各三錢炙甘草二錢川椒麻黃不去節冬月加白芷各一錢上㕮咀每服五錢生薑三片棗二枚蔥白三寸同煎至一盞去渣溫服食遠忌一切冷物及風寒涼處坐臥行立溫肺湯治鼻不聞香臭眼多眵淚丁香二分防風炙甘草葛根羌活各一錢升麻黃耆各二節錢麻黃不去節四錢上為粗末水二盞蔥白三根煎至一盞去渣食後服禦寒湯寒氣風邪傷於毛皮令鼻壅塞咳嗽上喘之證黃連黃柏羌活各二分炙甘草佛耳草款冬花白芷防風各三分升麻人參陳皮各五分蒼朮七分黃耆一錢上㕮咀都作一服水二盞煎至一盞去渣食後熱服
