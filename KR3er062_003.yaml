body:
  text: 卷下大便結燥門大便結燥論金匱真言論云北方黑色入通腎開竅於二陰藏精於腎又云腎主大便大便難者取足少陰夫腎主五液津液盛則大便如常若飢飽失節勞役過度損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真陰津液虧少故大便結燥然結燥之病不一有熱燥有風燥有陽結有陰結又有年老氣虛津液不足而結燥者治法云腎惡燥急食辛以潤之結者散之如少陰不得大便以辛潤之太陰不得大便以苦泄之陽結者散之陰結者溫之仲景云小便利而大便硬不可攻下以脾約丸潤之食傷太陰腹滿而食不化腹響然不能大便者以苦藥泄之如血燥而不能大便者以桃仁酒製大黃通之風結燥而大便不行者以麻子仁加大黃利之如氣澀而大便不通者以郁李仁枳實皂角仁潤之大抵治病必究其源不可一概用巴豆牽牛之類下之損其津液燥結愈甚復下復結極則以至導引於下而不通遂成不救噫可不慎哉通幽湯治大便難幽門不通上衝吸門不開噎塞不便燥祕氣不得下治在幽門以辛潤之炙甘草紅花各一分生地黃熟地黃各五分升麻桃仁泥當歸身各一錢上都作一服水二大盞煎至一盞去渣調檳榔細末五分稍熱食前服之潤燥湯升麻生地黃各二錢熟地黃當歸梢生甘草大黃煨桃仁泥麻仁各一錢紅花五分上除桃仁麻仁另研如泥外銼如麻豆大都作一服水二盞入桃仁麻仁泥煎至一盞去渣空心稍熱服潤腸丸治脾胃中伏火大便祕澀或乾燥閉塞不通全不思食乃風結血祕皆令閉塞也以潤燥和血疏風自然通利矣桃仁湯浸去皮尖麻仁各一兩當歸梢大黃煨羌活各一兩上除桃仁麻仁另研如泥外搗為極細末煉蜜為丸如梧桐子大每服三五十丸空心白湯下如病入不大便為大便不通而澀其邪盛者急加酒洗大黃以利之如血燥而大便燥乾者加桃仁酒洗大黃如風結燥大便不行者加麻仁大黃如風濕而大便不行加煨皂角仁大黃秦艽以利之如脈澀覺身癢氣澀而大便不通者加郁李仁大黃以除氣燥如寒陰之病為寒結閉而大便不通者以局方中半硫丸或加煎附子乾薑湯冰冷與之其病雖陰寒之證當服陽藥補之若大便不通者亦當十服中與一服藥微通其大便不令結閉乃治之大法若病人雖是陰證或是陰寒之證其病顯躁脈實堅亦宜於陽藥中少加苦寒之藥以去熱躁躁止勿加如陰躁欲坐井中者其二腎脈按之必虛或沉細而遲此易為辨耳知有客邪之病亦當從權加藥以去之麻黃白朮湯治大便不通五日一遍小便黃赤渾身腫面上及腹尤甚其色黃麻木身重如山沉困無力四肢痿軟不能舉動喘促唾清水吐噦痰唾白沫如膠時躁熱發欲去衣須臾熱過振寒項額有時如冰額寒尤甚頭旋眼黑目中溜火冷淚鼻不聞香臭少腹急痛當臍中有動氣按之堅硬而痛青皮去腐酒黃連各一分酒黃柏橘紅甘草炙半升麻各二分黃耆人參桂枝白朮厚朴柴胡蒼朮豬苓各三分吳茱萸白茯苓澤瀉各四分白豆蔻炒曲各五分麻黃不去節五錢杏仁四個上㕮咀分作二服水二大盞半先煎麻黃令沸去沫再入諸藥同煎至一盞去渣稍熱食遠服此證宿有風濕熱伏於榮血之中其木火乘於陽道為上盛元氣短少上喘為陰火傷其氣四肢痿在腎水之間乃所勝之病今正遇冬寒得時乘其肝木又實其母肺金剋火凌木是大勝必有大復其證善恐缺多嚏鼻中如有物不聞香臭目視䀮䀮多悲健忘少腹急痛通身黃腹大脹面目腫尤甚食不下痰唾涕有血目眥瘍大便不通並宜此藥治之升陽湯一名升陽瀉濕湯治膈咽不通逆氣裡急大便不行青皮槐子各二分生地黃熟地黃黃柏各三分當歸身甘草梢一錢桃仁十個另研上㕮咀如麻豆大都作一服入桃仁泥水二大盞煎至一盞去渣稍熱食前服活血潤燥丸治大便風祕血祕常常燥結當歸梢一錢防風三錢大黃濕紙裹煨羌活各一兩皂角仁燒存性去皮一兩五錢其性得濕則滑濕滑則燥結自除桃仁二兩研如泥麻仁二兩五錢研如泥上除麻仁桃仁另研如泥外為極細末煉蜜為丸如梧桐子大每服五十丸白湯下三兩服後須以蘇麻子粥每日早晚食之大便日久不能結燥也以瓷器盛之紙封無令見風潤腸湯治大腸結燥不通生地黃生甘草各一錢大黃煨熟地黃當歸梢升麻桃仁麻仁各一錢紅花三分上㕮咀水二盞煎至一盞去渣食遠溫服小便淋閉門小便淋閉論難經云病有關有格關則不得小便又云關無出之謂皆邪熱為病也分在氣在血而治之以渴與不渴而辨之如渴而小便不利者是熱在上焦肺之分故渴而小便不利也夫小便者是足太陽膀胱經所主也長生於申申者西方金也肺合生水若肺中有熱不能生水是絶其水之源經云虛則補其毋宜清肺而滋其化源也故當從肺之分助其秋令水自生焉又如雨如露如霜皆從天而降下也乃陽明之陰明秋氣自天而降下也且藥有氣之薄者乃陽中之陰是感秋清肅殺之氣而生可以補肺之不足淡味滲泄之藥是也茯苓澤瀉琥珀燈心通草車前子木通瞿麥萹蓄之類以清肺之氣泄其火資水之上源也如不渴而小便不通者熱在下焦血分故不渴而大燥小便不通也熱閉於下焦者腎也膀胱也乃陰中之陰陰受熱邪閉塞其流易上老云寒在胸中遏絶不入熱在下焦填塞不便須用感北方寒水之化氣味俱陰之藥以除其熱泄其閉塞內經云無陽則陰無以生無陰則陽無以化若服淡滲之藥其性乃陽中之陰非純陽之劑陽無以化何能補重陰之不足也須用感地之水運而生太苦之味感天之寒藥而生大寒之氣此氣味俱陰乃陰中之陰也大寒之氣人稟之生膀胱寒水之運人感之生腎此藥能補腎與膀胱受陽中之陽熱火之邪而閉其下焦使小便不通也夫用大苦寒之藥治法當寒因熱用又云必伏其所主而先其所因其始則氣同其終則氣異也通關丸一名滋腎丸治不渴而小便閉熱在下焦血分也黃柏去皮銼酒洗焙知母銼酒洗焙乾各一兩肉桂五分上為細末熟水為丸如梧桐子大每服一百丸空心白湯下頓兩足令藥易下行故也如小便利前陰中如刀刺痛當有惡物下為驗清肺飲子治渴而小便閉澀不利邪熱在上焦氣分燈心一分通草二分澤瀉瞿麥琥珀各五分萹蓄木通各七分車前子炒一錢茯苓去皮二錢豬苓去皮三錢上為粗末每服五錢水一盞半煎至一盞稍熱食遠服或局方八正散五苓散亦宜服之導氣除燥湯治小便閉塞不通乃血澀致氣不通而竅澀也茯苓去皮滑石炒黃各二錢知母細銼酒洗澤瀉各三錢黃柏去皮酒洗四錢上㕮咀每服五錢水三盞煎至一盞去渣稍熱空心服如急閉不拘時服腎疸湯治腎疸目黃甚至渾身黃小便赤澀羌活防風藁本獨活柴胡各五分升麻五錢以上治腎疸目黃渾身黃白茯苓二分澤瀉三分豬苓四分白朮五分蒼朮三錢以上治小便赤澀黃柏二分人參三分葛根五分神麯六分甘草三錢上銼如大豆大分作二服水三盞煎至一盞去渣稍熱食前服痔漏門痔漏論內經曰因而飽食筋脈橫解腸澼為痔夫大腸庚也主津本性燥清肅殺之氣本位主收其所司行津以從足陽明旺則生化萬物者也足陽明為中州之土若陽衰亦殞殺萬物故曰萬物生於土而歸於土者是也以手陽明大腸司其化焉既在西方本位為之害蜚司殺之府因飽食行房忍泄前陰之氣歸於大腸木乘火勢而侮燥金故火就燥也大便必閉其疾甚者當以苦寒瀉火以辛溫和血潤燥疏風止痛是其治也以秦艽當歸梢和血潤燥以桃仁潤血以皂角仁除風燥以地榆破血以枳實之苦寒補腎以下泄胃實以澤瀉之淡滲使氣歸於前陰以補清燥受胃之濕邪也白朮之苦甘以苦補燥氣之不足其甘味以瀉火而益元氣也故曰甘寒泄火乃假枳實之寒也古人用藥為下焦如瀆又曰在下者引而竭之多為大便祕澀以大黃推去之其津血益不足以當歸和血及油潤之劑大便自然軟利矣宜作銼湯以與之是下焦有熱以急治之之法也以地榆酸苦而壞胃故宿食消盡空心作丸服之秦艽白朮丸治痔疾並痔漏有膿血大便燥硬而作疼痛不可忍秦艽去蘆桃仁湯浸去皮尖皂角仁燒存性各一兩當歸梢酒浸澤瀉枳實麩炒黃白朮各五錢地榆三錢上為細末和桃仁泥研勻煎熱湯打麥糊為丸如雞頭仁大令藥光滑焙乾每服五七十丸白湯下空心服待少時以美膳壓之忌生冷硬物冷水冷菜之類並濕面酒及辣辛熱大料物之類犯之則藥無驗也秦艽蒼朮湯治痔疾若破謂之痔漏大便祕澀必作大痛此由風熱乘食飽不通氣逼大腸而作也受病者燥氣也為病者胃濕也胃刑大腸則化燥火以乘燥熱之實勝風附熱而來是濕熱風燥四氣而合故大腸頭成塊者濕也作大痛者風也若大便燥結者主病兼受火邪熱結不通也去此四者其西方肺主諸氣其體收下亦助病為邪須當破氣藥兼之治法全矣以銼湯與之其效如神秦艽去芛桃仁湯浸去皮另研皂角仁燒存性另研各一錢蒼朮制防風各七分黃柏去皮酒洗五分當歸梢酒洗澤瀉各三分梭身檳榔一分另研大黃少許雖大便過澀亦不可多用上除檳榔桃仁皂角仁三味外余藥㕮咀如麻豆大都作一服水三盞煎至一盞二分去渣入檳榔等三味末再上火煎至一盞空心熱服待少時以美膳壓之不犯胃氣也服藥日忌生冷硬物及酒濕面大料物乾姜之類犯之則其藥無效如有白膿加白葵花頭五朵去萼心青皮半錢不去白入正藥中同煎木香三分為細末同檳榔等三味依前煎服餌古人治此疾多以歲月除之此藥一服則愈七聖丸治大腸疼痛不可忍叔和云積氣生於脾臟傍大腸疼痛陳難當漸交稍瀉三焦火莫謾多方立紀綱羌活一兩郁李仁湯浸去皮另研一兩五錢大黃八錢煨檳榔桂去皮木香川芎各五錢上除郁李仁另研入外共為細末煉蜜為丸如梧桐子大每服三五十丸白湯下食前取大便微利一服而愈切禁不得多利大便其痛滋甚秦艽防風湯治痔漏每日大便時發疼痛如無疼痛者非痔漏也此藥主之秦艽防風當歸身白朮各一錢五分炙甘草澤瀉各六分黃柏五分大黃煨橘皮各三分柴胡升麻各二分桃仁三十個紅花少許上銼如麻豆大都作一服水三盞煎至一盞去渣稍熱空心服之避風寒忌房事酒濕面大辛熱物秦艽羌活湯治痔漏成塊下垂不任其癢羌活一錢二分秦艽黃耆各二錢防風七分升麻炙甘草麻黃柴胡各五分藁本三分細辛少許紅花少許上銼如麻豆大都作一服水二盞煎至一盞去渣空心服之忌風寒處大小便當歸郁李仁湯治痔漏大便硬努出大腸頭下血苦痛不能忍郁李仁皂角仁各一錢枳實七分秦艽麻仁當歸梢生地黃蒼朮各五分大黃煨澤瀉各三分上銼如麻豆大除皂角仁另為末水三盞煎至一盞去渣入皂角仁末調空心食前服之忌如前紅花桃仁湯治痔漏經年因而飽食筋脈橫解腸澼為痔治法當補北方瀉中央黃柏一錢五分生地黃一錢澤瀉八分蒼朮六分當歸梢防己防風梢豬苓各五分麻黃二分紅花半分桃仁十個上銼如麻豆大水三盞煎至一盞去渣稍熱食前服之忌如前秦艽當歸湯治痔漏大便結燥疼痛大黃煨四錢秦艽枳實各一錢澤瀉當歸梢皂角仁白朮各五分紅花少許桃仁二十個上都作一服水三盞煎至一盞去渣食前熱服忌如前陰痿陰汗門陰痿陰汗及臊臭論一富者前陰臊臭又因連日飲酒腹中不和求先師治之日夫前陰者足厥陰肝之脈絡循陰器出其挺末凡臭者心之所主散入五方為五臭如肝為臊此共一也當於肝經中瀉行間是治其本後於心經中瀉少衝乃治其標如惡針當用藥除之酒者氣味俱陽能生里之濕熱是風濕熱合於下焦為邪故經云下焦如瀆又云在下者引而竭之酒是濕熱之水亦宜決前陰以去之龍膽瀉肝湯治陰部時復熱癢及臊臭柴胡梢澤瀉各一錢車前子木通各五分生地黃當歸梢草龍膽各三分上銼如麻豆大都作一服水三盞煎至一盞去渣空心稍熱服便以美膳壓之此藥柴胡入肝為引用澤瀉車前子木通淡滲之味利小便亦除臊氣是名在下者引而竭之生地黃草龍膽之苦寒瀉酒濕熱更兼車前子之類以撤肝中邪氣肝主血用當歸以滋肝中血不足也清震湯治小便溺黃臊臭淋瀝兩丸如冰陰汗浸多羌活酒黃柏各一錢升麻柴胡蒼朮黃芩各五分澤瀉四分麻黃根豬苓防風各三分炙甘草當歸身藁本各二分紅花一分上銼如麻豆大都作一服水二盞煎至一盞去渣臨臥服大忌酒濕面固真湯一名正元湯治兩丸冷前陰痿弱陰汗如水小便後有余滴𠤏臀並前陰冷惡寒而喜熱膝下亦冷升麻羌活柴胡各一錢炙甘草草龍膽澤瀉各一錢五分黃柏知母各二錢上銼如麻豆大分作二服水二盞煎至一盞去渣空心稍熱服以早飯壓之清魂湯一名柴胡勝濕湯治兩外腎冷兩髀陰汗前陰痿陰囊濕癢臊氣柴胡生甘草酒黃柏各二錢升麻澤瀉各一錢五分當歸梢羌活麻黃根漢防己草龍膽茯苓各一錢紅花少許五味子二十個上銼如麻豆大分作二服水二盞煎至一盞去渣食前稍熱服忌酒濕面房事椒粉散治前陰兩丸濕癢痛秋冬甚夏月減肉桂二分川椒當歸梢豬苓各三分蛇床子黑狗脊各五分麻黃根一錢輕粉少許紅花少許斑蝥兩枚上為末干糝上避風寒冷濕處坐臥補肝湯治前陰冰冷並陰汗兩腳痿弱無力黃耆七分炙甘草五分升麻豬苓各四分白茯苓葛根人參各三分柴胡羌活陳皮連翹當歸身黃柏炒澤瀉蒼朮曲末知母防風各二分上銼如麻豆大都作一服水二大盞煎至一盞去渣空心稍熱服忌酒濕面溫腎湯治面色痿黃腳痿弱無力陰汗柴胡麻黃根各六分白茯苓白朮酒黃柏豬苓升麻各一錢蒼朮防風各一分五錢澤瀉二錢上分作二服每服水二大盞煎至一盞去渣食前稍熱服一時辰許方食延胡丁香丸一名丁香疝氣丸治臍下撮急疼痛並周身皆急痛小便頻數及五脈急獨腎脈按之不急皆虛無力名曰腎疝羌活三錢當歸茴香各二錢延胡索麻黃根節肉桂各一錢丁香木香甘草川烏頭各五分防己三分蠍十三個上為細末酒煮麵糊為丸如雞頭大每服五十丸空心鹽白湯服瀉痢門訶子皮散癸卯冬白樞判家一老僕面塵脫色神氣特弱病脫肛日久服藥未驗復下赤白膿痢作裡急後重白多赤少不任其苦以求其治曰此非肉食膏粱必多蔬食或飲食不節天氣已寒衣蓋猶薄不禁而腸頭脫下者寒也真氣不禁形質不收乃血滑脫也此乃寒滑氣泄不固故形質下脫也當以澀去其脫而除其滑微酸之味固氣上收以大熱之劑而除寒補陽以補氣之藥升陽益氣御米殼去蒂萼蜜炒橘皮各五分乾薑炮六分訶子煨去核七分上為細末都作一服水二盞煎至一盞和渣空心熱服升麻補胃湯治宿有陽明血證因五月間大熱吃杏腸澼下血唧遠散漫如篩腰沉沉然腹中不痛血色紫黑病名濕毒腸澼屬陽明少陽經血證也白芍藥一錢五分升麻羌活黃耆各一錢生地黃熟地黃獨活牡丹皮炙甘草柴胡防風各五分當歸身葛根各三分肉桂少許上銼如麻豆大分作二服每服水二盞煎至一盞去渣食前稍熱服升陽去熱和血湯治腸澼下血另作一派其血唧出有力而遠射四散如篩腸中血下行腹中大作痛乃陽明氣衝熱毒所作也當升陽去濕熱和血脈是其治也橘皮二分熟地黃當歸身蒼朮秦艽肉桂各三分生地黃牡丹皮生甘草各五分升麻七分熟甘草黃耆各一錢白芍藥一錢五分上㕮咀都作一服水四盞煎至一盞去渣空心稍熱服立效益智和中湯治腸澼下血或血色紫黑腹中痛腹皮惡寒右手關脈弦按之無力而喜熱物尉之內寒明矣肉桂一分桂枝四分牡丹皮柴胡葛根益智仁半夏各五分當歸身炙甘草黃耆升麻各一錢白芍藥一錢五分乾薑少許上為粗末都作一服水三盞煎至一盞去渣食後溫服芍藥柏皮丸治濕熱惡痢血痢頻並窘痛無問膿血並皆治之芍藥黃柏各一兩當歸黃連各五錢上為末飯為丸如雞頭大每服五七十丸食前米飲湯下忌油膩酒濕面等物和中益胃湯治太陰陽明腹痛大便常泄若不泄即祕而難見在後傳作濕熱毒下鮮紅血腹中微痛脅下急縮脈緩而洪弦中下得之按之空虛蘇木一分藁本益智仁各二分熟地黃炙甘草各三分當歸身四分柴胡升麻各五分上㕮咀都作一服水二盞煎至一盞去渣空心溫服槐花散治腸澼下血濕毒下血川芎四分槐花青皮荊芥穗熟地黃白朮各六分當歸身升麻各一錢上為細末每服三錢米飲湯調下食前忌酒濕面生冷硬物茯苓湯治因傷冷飯水泄一夜走十行變作白痢次日其痢赤白腹中療痛減食熱躁四肢沉困無力生黃芩三分當歸身四分肉桂炙甘草各五分豬苓茯苓各六分澤瀉一錢芍藥一錢五分蒼朮生薑升麻柴胡各二分上㕮咀如麻豆大分作二服每服水二盞煎至一盞去渣稍熱食前服之黃耆補胃湯治一日大便三四次溏而不多有時作泄腹中鳴小便黃黃耆柴胡當歸身益智橘皮各三分升麻六分炙甘草二錢紅花少許上㕮咀都作一服水二盞煎至一盞去渣稍熱食前服之升陽除濕湯自下而上者引而去之蒼朮一錢柴胡羌活防風升麻神麯澤瀉豬苓各五分炙甘草陳皮麥蘖曲各三分上都作一服水二盞煎至一盞去渣空心服之如胃寒腸鳴加益智仁半夏各五分生薑三片棗一枚同煎至非腸鳴不得用人參益胃湯治頭悶勞動則微痛不喜飲食四肢怠惰躁熱短氣口不知味腹鳴大便微溏身體昏悶覺渴不喜冷物黃耆甘草當歸梢益智各二分人參黃芩柴胡半夏白朮各三分陳皮升麻各五分蒼朮一錢五分紅花少許上都作一服水二盞煎至一盞去渣稍熱食前服之升麻補胃湯治因內傷服牽牛大黃食藥泄瀉過多腹中大痛甘草七分升麻柴胡草豆蔻黃耆各五分半夏三分當歸身乾薑各二分紅花少許上都作一服水二盞煎至一盞去渣稍熱食遠服之瘡瘍門散腫潰堅湯治馬刀瘡結硬如石或在耳下至缺盆中或肩上或於脅下皆手足少陽經中及瘰癧遍於頦或至頰車堅而不潰在足陽明經中所出或二證瘡已破流膿水並皆治之黃芩八錢酒洗一半生用一半草龍膽酒洗各炒四遍栝蔞根坐碎酒洗黃柏酒製酒知母桔梗昆布各五錢柴胡四錢炙甘草京三稜酒洗廣朮酒洗炒連翹各三錢葛根白芍藥當歸梢黃連各二錢升麻六分上㕮咀每服六錢水二盞零八分先浸多半日煎至一盞去渣食後熱服於臥處伸足在高處頭低垂每含一口作十次咽服畢依常安臥取藥在膈上停蓄故也另攢半料作細末煉蜜為丸如緑豆大每服百餘丸用此藥湯留一口送下或加海藻五錢炒亦妙升陽調經湯治瘰癧繞頸或至頰車此皆由足陽明胃經中來若瘡深遠隱曲肉底是足少陰腎經中來乃戊脾傳於癸腎是夫傳於妻俱作塊子堅硬大小不等並皆治之或作丸亦可升麻八錢葛根草龍膽酒製黃芩酒製廣朮酒洗炒京三稜酒洗炒炙甘草黃連酒洗連翹桔梗各五錢生黃芩四錢當歸身芍藥各三錢黃柏酒洗二錢知母酒洗炒一兩上另稱一半作末煉蜜為丸如緑豆大每服百餘丸一半作㕮咀每服五錢若能食大便硬可旋加至七八錢水二盞先浸半日煎至一盞去渣臨臥熱服足高去枕仰臥噙一口作十次咽之留一口在後送下丸藥服畢其臥如常連翹散堅湯治耳下或至缺盆或肩上生瘡堅硬如石動之無根名曰馬刀從手足少陽經中來也或生兩脅或已流膿作瘡未破並皆治之柴胡一兩二錢草龍膽酒洗四次土瓜根酒製各一兩黃芩酒炒二次七錢當歸梢生黃芩廣朮京三稜同廣朮酒炒連翹芍藥各五錢炙甘草三錢黃連酒炒二次蒼朮各二錢上另稱一半為細末煉蜜為丸如緑豆大每服百餘丸一半㕮咀每服五錢水二盞先浸多半日煎至一盞去渣臨臥熱服去枕仰臥每口作十次咽之留一口送下丸藥服畢臥如常更以後藥塗之龍泉散龍泉粉炒瓦粉廣朮京三稜酒洗炒昆布各五錢上同為細末煎熱水調塗之用此藥去疾尤速救苦化堅湯治瘰癧馬刀挾癭從耳下或耳後下頸至肩上或入缺盆中乃手足少陽之經分其瘰癧在頦下或至頰車乃足陽明之經分受心脾之邪而作也今將二證合而治之黃耆一錢護皮毛實腠理虛及活血脈生血亦瘡家聖藥也又能補表實元氣之弱也人參三分補肺氣之藥也如氣短不調及喘者加之炙甘草五分能調中和諸藥瀉火益胃氣亦能去瘡邪真漏蘆升麻各一錢葛根五分此三味俱足陽明本經藥也連翹一錢此一味十二經瘡中之藥不可無者能散諸血結氣聚此瘡家之神藥也牡丹皮三分去腸胃中留滯宿血當歸身生地黃熟地黃各三分此三味諸經中和血生血涼血藥也白芍藥三分如夏月倍之其味酸其氣寒能補中益肺之虛弱治腹中痛必用之冬寒則不可用肉桂二分大辛熱能散結積陰證瘡瘍須當少用之此寒因熱用之意又為寒陰覆蓋其瘡用大辛熱以消浮凍之氣如有煩躁者去之柴胡八分功同連翹如瘡不在少陽經則去之黍黏子三分無腫不用羌活一錢獨活防風各五分此三味必關手足太陽證脊痛項強不可迥視腰似折項似拔者是也其防風一味辛溫若瘡在膈以上雖無手足太陽經證亦當用之為能散結去上部風邪病人身拘急者風也昆布二分其味大咸若瘡堅硬結硬者宜用鹹能軟堅京三稜煨二分廣朮煨三分此二味若瘡堅硬甚者用之如不堅硬勿用益智仁二分如唾多者胃不和也或病人吐沫吐食胃上寒者加之無則去之大麥蘖面一錢治腹中縮急兼能消食補胃神麯末炒黃色二分為食不消化故也黃連去須三分以治煩悶黃柏炒三分如有熱或腿腳無力加如有躁煩欲去衣者腎中伏火也更宜加之無此證勿用厚朴三錢二分薑製如腹脹者加之無則勿用上為細末湯浸蒸餅和丸捻作餅子日乾搗如米粒大每服三錢白湯下如氣不順加橘皮甚者加木香少許量病人虛實臨時斟酌與之無令藥多妨其飲食此治之大法也如止在陽明分為瘰癧者去柴胡黍黏子二味余皆用之如在少陽分為馬刀挾癭者去獨活漏蘆升麻葛根更加瞿麥穗三分如本人素氣弱其病勢來時氣盛而不短促者不可考其平素宜作氣盛而從病變之權也宜加黃芩黃連黃柏知母防己之類神邪氣在上中下三處假令在上焦加黃芩一半酒洗一半生用在中焦加黃連一半酒洗一半生用在下焦則加酒製黃柏知母防己之類選而用之如本人大便不通而滋其邪盛者加酒製大黃以利如血燥而大便燥乾者加桃仁酒製大黃二味如風結燥不行者加麻仁大黃如風澀而大便不行加煨皂角仁大黃秦艽以利之如脈澀覺身癢氣澀而大便不通者加郁李仁大黃以除氣燥也如陰寒之病為寒結閉而大便不通以局方中半硫丸或加煎附子乾薑冰冷與之大抵用藥之法不惟瘡瘍一說諸疾病量人素氣弱者當去苦寒之藥多加人參黃耆甘草之類瀉火而先補其元氣余皆仿此柴胡連翹湯治男子婦人馬刀瘡中桂三分當歸梢二錢五分黍黏子二錢炙甘草酒黃柏生地黃各三錢柴胡黃芩炒酒知母連翹各五錢瞿麥穗六錢上銼如麻豆大每服五水二大盞煎至一盞去渣稍熱食後服之黍黏子湯治耳痛生瘡昆布蘇木生甘草蒲黃草龍膽各一分黍黏子連翹生地黃當歸梢黃芩炙甘草黃連各二分柴胡黃耆各三分桔梗三錢桃仁三個紅花少許上銼如麻豆大都作一服水二盞煎至一盞去渣稍熱食後服忌寒藥利大便淨液湯一名連翹防風湯治皮膚癢腋下瘡背上瘡耳聾耳鳴桂枝二分連翹生地黃桔梗升麻甘草各五分當歸梢七分麻黃草豆蔻仁羌活防風柴胡蒼朮各一錢酒黃芩一錢紅花少許上銼如麻豆大都作一服水二盞煎至一盞去渣食後熱服消腫湯治馬刀瘡黍黏子炒黃連各五分當歸梢甘草各一錢栝蔞根黃耆各一錢五分生黃芩柴胡各二錢連翹三錢紅花少許上㕮咀每服五錢水二盞煎至一盞去渣稍熱食後服忌酒濕面內托羌活湯治足太陽經中左右尺脈俱緊按之無力尻臀生癰堅硬腫痛大作肉桂三分連翹炙甘草蒼朮橘皮各五分當歸梢防風藁本各一錢黃耆一錢五分黃柏酒製羌活各二錢上㕮咀都作一服水二盞酒一盞煎至一盞去渣稍熱空心服以夾衣蓋癰上使藥力行罷去蓋之衣升麻托裡湯治婦人兩乳間出黑頭瘡瘡頂陷下作黑眼子其脈弦洪按之細小黃柏二分肉桂三分黍黏子五分黃耆炙甘草當歸梢各一錢連翹升麻葛根各一錢五分上㕮咀都作一服水一大盞酒半盞同煎至一盞去渣稍熱食後服內托黃耆湯賈德茂小男於左大腿近膝股內出附骨癰不辨肉色漫腫皮澤木硬瘡勢甚大其左腳乃肝之脾土也更在足厥陰肝經之分少侵足太陰脾經之分其脈左三部細而弦按之洪緩微有力此藥主之生地黃一分黃柏二分肉桂三分羌活五分當歸梢七分半土瓜根酒製柴胡梢各一錢連翹一錢三分黃耆二錢上㕮咀都作一服酒一盞水二盞煎至一盞去渣空心熱服柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀瘡柴胡連翹當歸梢生甘草黃芩黍黏子京三稜桔梗各二分黃連五分紅花少許上銼如麻豆大都作一服水二大盞煎至一盞去渣稍熱食後服忌苦藥泄大便白芷升麻湯尹老家素貧寒形志皆苦於手陽明大腸經分出癰幼小有㿗疝其臂外皆腫痛在陽明左右寸脈皆短中得之俱弦按之洪緩有力此癰得自八風之變以脈斷之邪氣在表其證大小便如故飲食如常腹中和口知味知不在裡也不惡風寒止熱躁脈不浮知不在表也表裡既和邪氣在經脈之中內經云凝於經絡為瘡癰其癰出身半以上故風從上受之故知是八風之變為瘡者也故治其寒邪調其經脈中血氣使無凝滯而已炙甘草一分升麻桔梗各五分白芷七分當歸梢生地黃各一錢生黃芩一錢五分酒黃芩連翹黃耆各二錢中桂少許紅花少許上㕮咀分作二服酒水各一大盞半同煎至一盞去渣稍熱臨臥服一服而愈保生救苦散治火燒或熱油烙及脫肌肉者生寒水石大黃火煨黃柏油炒各等分上為細末用油調塗之或乾用此藥塗之其痛立止日近完復永無破傷風之患一上散治諸般疥癬必效雄黃通明手呵破者黑狗脊蛇床子炒熟硫黃各五錢寒水石六錢斑蝥十三個去翅足毛研碎上另研雄黃硫黃寒水石如粉次入斑蝥和蛇床子黑狗脊為細末同研勻先洗疥癬令湯透去痂油調手中擦熱以鼻中臭三兩次擦上可一上即愈如痛甚及腫滿高起者加寒水石一倍如不苦癢只加黑狗脊如微癢只加蛇床子如瘡中有蟲加雄黃如喜火灸湯浴者加硫黃聖愈湯治諸惡瘡血出多而心煩不安不得睡眠亡血故也以此藥主之生地黃熟地黃川芎人參各三分當歸身黃耆各五分上㕮咀如麻豆大都作一服水二大盞煎至一盞去渣稍熱無時服獨聖散治湯泡破火燒破瘡毒疼痛生白礬上為細末芝麻油調掃瘡破處不拘時候黃耆肉桂柴胡酒煎湯治附骨癰堅硬漫腫不辨肉色行步作痛按之大痛黃耆當歸梢各二錢柴胡一錢五分黍黏子炒連翹肉桂各一錢升麻七分炙甘草黃柏各五分上㕮咀好糯酒一大盞半水一大盞半同煎至一大盞去渣空心溫服少時便以早飯壓之不致大熱上攻中上二焦也雜病門安神丸治心神煩亂怔忡兀兀欲吐胸中氣亂而熱有似懊憹之狀皆膈上血中伏火蒸蒸然不安宜用權衡法以鎮陰火之浮越以養上焦之元氣經云熱淫所勝治以甘寒以苦瀉之以黃連之苦寒去心煩除濕熱為君以甘草生地黃之甘寒瀉火補氣滋生陰血為臣以當歸補血不足以硃砂納浮留之火而安神明也黃連一錢五分酒洗硃砂一錢水飛酒生地黃酒當歸身炙甘草各五分上件除硃砂水飛外搗四味為細末同和勻湯浸蒸餅為丸如黍米大每服十五丸津唾咽下食後硃砂安神丸治心煩懊憹心亂怔忡上熱胸中氣亂心下痞悶食入反出硃砂四錢黃連五錢生甘草二錢五分上為末湯浸蒸餅為丸如黍米大每服十丸食後津唾咽下補氣湯治皮膚間有麻木乃肝氣不行故也白芍藥橘皮不去白各一兩五錢炙甘草黃耆各一兩澤瀉五錢上㕮咀每服一兩水二盞至一盞去渣溫服當歸補血湯治婦人肌熱躁熱目赤面紅煩渴引飲晝夜不息其脈洪大而虛重按全無內經曰脈虛血虛脈實血實又云血虛發熱證象白虎惟脈不長實為辨也若誤服白虎湯必死此病得之於飢困勞役黃耆一兩當歸身二錢酒製上㕮咀都作一服水二盞煎至一盞去渣稍熱空心服柴胡升麻湯治男子婦人四肢發熱肌熱筋骨熱表熱如火燎以手捫之烙人手夫四肢者屬脾土也熱伏地中此病多因血虛而得之又有胃虛過食冷物郁遏陽氣於脾土之中此藥主之升麻葛根獨活羌活白芍藥人參各五錢炙甘草柴胡各三錢防風二錢五分生甘草二錢上㕮咀每服五錢水二大盞煎至一盞去渣熱服忌寒冷之物火鬱湯治五心煩熱是火鬱於地中四肢者脾土也心火下陷於脾土之中鬱而不得伸故經云火鬱則發之升麻葛根柴胡白芍藥各一兩防風甘草各五錢上㕮咀每服五錢水二大盞入連須蔥白三寸煎至一盞去渣稍熱