痛咳嗽兩手寸脈短右手脈弦細兼澀關脈虛升麻柴胡當歸各二分神麯三分炒澤瀉四分大麥蘖曲蒼朮各五分黃耆二錢五分炙甘草八分紅花少許五味子二十個上㕮咀分作二服水二盞煎至一盞去渣食遠服麻黃分術湯治秋冬每夜五更嗽連聲不絶乃至天曉日高方緩日苦兩脅下痛心下痞悶臥而多驚筋攣肢節疼痛痰唾涎沫日晚神昏呵缺不進飲食麻黃八錢蒼朮五錢黃耆一錢五分草豆蔻六分柴胡羌活各五分生甘草當歸梢防風各四分炙甘草黃芩各三分五味子九個上㕮咀分作二服水二盞煎至一盞稍熱臨臥服上清湯清利頭目寬快胸膈人參蔓荊子各五分防風一錢葛根一錢五分黃耆三錢甘草四錢上㕮咀分作二服水二盞煎至一盞去渣臨臥熱服以夾衣蓋覆不語須臾汗出為效術桂湯一名麻黃蒼朮湯治寒濕所客身體沉重胃脘痛面色痿黃蒼朮二錢麻黃炒神麯橘皮白茯苓澤瀉各一錢桂梗半夏草豆蔻仁豬苓各五分黃耆三分炙甘草二分杏仁十個上都作一服水二盞生薑五片煎至一盞去渣食前熱服正氣湯治盜汗炒黃柏炒知母各一錢五分炙甘草五分上為粗末生一服水二盞煎至一盞食前溫服趁痛丸治打撲閃損腰痛不可忍乳香沒藥各錢白萵苣子一兩炒黃烏梅一個白粟米一抄炒黃上為細末煉蜜為丸如彈子大每服一丸細嚼溫酒空心下退熱湯治表中虛熱或遇夜則甚黃耆一錢柴胡七分生甘草黃連酒製黃芩芍藥地骨皮生地黃去血熱蒼朮各五分當歸身升麻各三分上㕮咀作一服水二盞煎至一盞去渣食遠溫服如身體力困者加麥門冬五味子各五分人參甘草各一錢解表升麻湯治遍身壯熱骨節疼痛升麻羌活蒼朮各一錢防風八分柴胡甘草各七分當歸藁本各五分橘皮三分冬加麻黃不去節春加麻黃去節上㕮咀作一服水二盞煎至一盞去渣溫服後以蔥醋湯發之得微汗為效天麻黃耆湯治表有風證因連日酣飲其證復來右口角並眼頗有側視及左手左腳腿麻木疼痛天麻芍藥神麯炒羌活肢節不痛去之茯苓各三分人參黃連各四分當歸五分黃耆甘草升麻葛根黃柏蒼朮各六分澤瀉七分柴胡九分上㕮咀作一服水二盞煎至一盞去渣食遠溫服或加豬苓六分健步丸治膝中無力伸而不得屈屈而不能伸腰背腿膝沉重行步艱難防己酒洗一兩羌活柴胡滑石炒炙甘草栝蔞根酒洗各五錢澤瀉防風各三錢苦參酒洗川烏各一錢肉桂五分上為細末酒糊為丸如梧桐子大每服七十丸煎愈風湯下空心服白朮除濕湯治午後發熱背惡風四肢沉重小便或多或少黃色此藥又治汗後發熱白朮一兩生地黃炒地骨皮澤瀉知母各七錢赤茯苓人參炙甘草柴胡各五錢上為粗末每服五錢水二盞煎至一盞去渣食遠溫服如小便快利減茯苓澤瀉一半如有刺痛一料藥中加當歸身酒洗七錢加味四君子湯治久瘧熱多寒少不止白朮白茯苓人參甘草柴胡薄荷葉黃芩各等分上㕮咀每服五錢水二盞生薑三片棗一枚煎至一盞去渣不拘時候服瀉血湯治發熱晝少而夜多太陽經中尤甚晝病則在氣夜病則在血是足太陽膀胱血中浮熱微有氣也既病人大小便如常知邪氣不在臟腑是無里證也外無惡寒知邪氣不在表也有時而發有時而止知邪氣不在表不在裡知在經絡也夜發多而晝發少是邪氣下陷之深也此雜證當從熱入血室而論之生地黃酒洗炒熟地黃蒲黃丹參酒炒當歸酒炒去土漢防己酒洗炒柴胡去蘆甘草梢炙羌活各一兩桃仁去皮三錢湯浸上為粗末每服五錢水一盞半煎至一盞去渣空心溫服洗面藥治面有䵟𪒟或生瘡或生痤痱及粉刺之類並去皮膚燥癢去垢膩潤澤肌膚皂角三斤去皮弦子另搗好升麻八兩楮實子五兩白芨一兩細銼甘松七錢𩿣砂連皮白丁香臘月收三奈子各五分緑豆八合揀淨另搗糯米一升二合上為細末用之如常瑩肌如玉散白丁香白芨白牽牛白蘞各一兩白芷七錢當歸梢白蒺藜升麻各五錢白茯苓楮實子各三錢麻黃去節二錢白附子連翹各一錢五分川椒一錢上為細末用之如常面油摩風膏麻黃升麻去黑皮防風各二錢羌活去皮當歸身白芨白檀各一錢上用小油半斤以銀器中熬綿包定前藥於油中熬之得所澄淨去渣入黃蠟一兩再熬之為度小兒門治驚論外物驚宜鎮心以黃連安神丸若氣動所驚宜寒水石安神丸大忌防風丸治風辛溫之藥必殺人何也辛散浮溫熱者火也能令母實助風之氣盛皆殺人也因驚而泄青色先鎮肝以硃砂之類勿用寒涼之氣大禁涼驚丸風木旺必克脾胃當先實其土後瀉其子閻孝忠編集錢氏方以益黃補土誤矣其藥有丁香辛熱助火火旺土愈虛矣青橘皮瀉肺金丁香辛熱大瀉肺與大腸脾實當瀉子今脾胃虛反更瀉子而助火重虛其土殺人無疑矣其風木旺證右關派洪大掌中熱腹皮熱豈可以助火瀉金如寒水來乘脾土其病嘔吐腹痛瀉痢青白益黃散聖藥也今立一方先瀉火補金大補其土是為神治之法黃耆湯黃耆二錢人參一錢炙甘草五分上㕮咀作一服水一大盞煎至半盞去渣食遠服加白芍藥尤妙此三味皆甘溫能補元氣甘能瀉火內經云熱淫於內以甘瀉之以酸收之白芍藥酸寒寒能瀉火酸味能瀉肝而大補肺金所補得金土之位金旺火虛風木何由而來剋土然後瀉風之邪夫益黃散理中丸養神丸之類皆治脾胃寒濕大盛神品之藥也若得脾胃中伏熱火勞役不足之證及服熱藥巴豆之類胃虛而成慢驚之證用之必傷人命夫慢驚風者皆由久瀉脾胃虛而生也錢氏以羌活膏療慢驚風誤矣脾虛者由火邪乘其土位故曰從後來者為虛邪火旺能實其木木旺故來剋土當於心經中以甘溫補土之源更於脾土中瀉火以甘寒更於脾土中補金以酸涼致脾土中金旺火衰風木自虛矣損食多進藥愈前藥是也益黃散治胃中風熱黃耆二錢陳皮去白人參各一錢芍藥七分生甘草熟甘草各五分黃連少許上為細末每服二錢水一盞煎至五分食前服升陽益血湯二月間有一小兒未滿一百日病腹脹二日大便一度瘦弱身黃色宜升陽氣滋血益血補血利大便蠍梢二分神麯末升麻各三分當歸厚朴各一錢桃仁十個上都作一服水一大盞煎至半盞去渣食遠熱服厚腸丸治小兒失乳以食飼之未有食腸不能克化或生腹脹四肢瘦弱或痢色無常厚朴青皮各二分橘紅半夏蒼朮人參各三分枳實麥蘖面神麯末各五分上為極細末水煮麵糊為丸如麻子大每服二十丸溫水送下食前忌飽食補陽湯時初冬一小兒二歲大寒證明堂青脈額上青黑腦後青絡高起舌上白滑喉鳴而喘大便微青耳尖冷目中常常淚下仍多眵胸中不利臥而多驚無搐則寒黃柏橘皮葛根連翹蠍梢炙甘草各一分升麻黃耆柴胡各二分當歸身麻黃各三分吳茱萸生地黃地龍各五分上㕮咀都作一服水一大盞半煎至六分去渣乳食後熱服服藥之後添喜笑精神出氣和順乳食旺大蕪荑湯一名梔子茯苓湯治黃疳土色為熱為濕當小便不利今反利知黃色為燥胃經中大熱發黃脫落知膀胱與腎俱受土邪乃大濕熱之證鼻下斷作瘡者土逆行榮氣伏火也能乳者胃中有熱也寒則食不入喜食土者胃不足也面黑色者為寒為痹大便青寒褐色血黑色熱蓄血中間黃色腸中有熱治法當滋榮潤燥除寒熱致津液防風黃連各一分黃柏炙甘草麻黃不去根節羌活各二分山梔子仁柴胡茯苓各三分當歸四分大蕪荑白朮各五分上銼如麻豆大都作一服用水一大盞半煎至六分去渣食前稍熱服塌氣退黃湯一名茯苓滲濕湯治小兒面色痿黃腹䐜脹食不能下白朮柴胡各半分升麻一分桂枝麻黃吳茱萸厚朴羌活草豆蔻神麯末蒼朮澤瀉白茯苓豬苓黃柏橘紅各二分青皮黃連各五分杏仁二個上都作一服水二大盞煎至一盞去渣食前溫服中滿分消丸枳實黃連去須厚朴各五分乾薑薑黃豬苓各一錢橘皮甘草白朮各一錢五分砂仁澤瀉茯苓各二錢半夏四錢黃芩一兩二錢上為細末湯浸蒸餅為丸如黍米大每服三五十丸溫水下消痞丸黃連五錢黃芩二錢厚朴七分薑黃五分乾生薑人參各四分甘草三分枳實二分橘皮一分上為細末湯浸蒸餅為丸如黍米大每服三十丸隨乳下癍疹論夫癍疹始出之證必先見面燒腮赤目胞亦赤呵缺煩悶乍涼乍熱咳嗽嚏噴足稍冷多睡驚並瘡疹之證或生膿胞或生小紅癍或生癮疹此三等不同何故俱顯上證而後乃出蓋以上諸證皆太陽寒水起於右腎之下煎熬左腎足太陽膀胱寒水夾脊逆流上頭下額逆手太陽丙火不得傳導逆於面上故顯是證蓋旺癸寒水克丙丁熱火故也諸癍證皆從寒水逆流而作也醫者當知此理乃敢用藥夫胞者一名赤宮一名丹田一名命門主男子藏精施化婦人系胞有孕俱為生化之源非五行也非水亦非火此天地之異名也象坤土之生萬物也夫人之始生也血海始淨一日二日精勝其血則為男子三日四日五日血脈已旺精不勝血則為女子二物相搏長生先身謂之神又謂之精道釋二門言之本來面目是也其子在腹中十月之間隨母呼吸者陽氣也而生動作滋益精氣神飢則食母血渴則飲母血兒隨日長皮肉筋骨血脈形氣俱足十月降生口中尚有惡血啼聲一發隨吸而下此惡血復歸命門胞中僻於一隅伏而不髮直至因內傷乳食濕熱之氣下流合於腎中二火交攻致榮氣不從逆於肉理惡血乃發諸癍疹皆出於膀胱旺水其瘍後聚肉理歸於陽明故三番癍始顯之證皆足太陽旺膀胱克丙小腸其始出皆見於面終歸於陽明肉理熱化為膿者也二火熾甚反勝寒水遍身俱出此皆出從足太陽傳變中來也當外發寒邪使令消散內瀉二火不令交攻其中令濕氣上歸復其本位可一二服立已仍令小兒以後再無二番癍出之患此內經之法覽者詳之消毒救苦散治癍證悉具消化便令不出如已出希者再不生癍防風羌活麻黃根升麻生地黃連翹初出者減出大者加酒黃柏各五分當歸身黃連各三分川芎藁本柴胡葛根酒黃芩生黃芩蒼朮各二分細辛生甘草白朮陳皮蘇木紅花各一分吳茱萸半分上銼如麻豆大每服五錢水二大盞煎至一盞去渣稍熱空心服夫癍疹出者皆因內傷必出癍榮氣逆故也大禁牽牛巴豆食藥宜以半夏枳朮大黃益智仁之類去其泄瀉止其吐若耳尖冷呵缺睡中驚嚏噴眼澀知必出癍也諸大膿泡小水泡癍疹癮三色皆榮氣逆而寒復其表宜以四味升麻湯中加當歸身連翹此定法也如肺成膿癍先嗽喘或氣高而喘促加人參少加黃芩以瀉伏火而補元氣如心出小紅癍必先見嗌乾驚悸身熱肌肉腫脈弦洪少加黃連如命門出癮疹必先骨疼身熱其疼痛不敢動搖少加生地黃又加黃柏諸癍疹皆為陰證瘡須皆因內傷飲食脾胃不足榮氣逆行雖火熱內熾陰覆其外治法如前辨小兒癍證呵缺嚏噴睡中發驚或耳光冷眼澀或辨復食口熱或口醋氣奶瓣不消或腹中痛如癍證少具其癍未發乃與升麻湯三五錢帶熱服之待身表溫和癍疹已顯服藥乃止如其身涼其癍未出辨得是癍證無問服數直候身表溫和及癍瘡已顯然後乃止只時時與桔梗湯寬胸膈利咽喉桔梗湯如癍已出只時時與之快咽喉寬利胸膈桔梗二錢甘草一錢炙上為粗末每服三錢水一大盞煎至六分去渣大溫時時服之不可計服數如見傷食證又見癍證先與不犯大黃巴豆藥克化過再與升麻湯如食重傷前藥不能過再與犯大黃巴豆藥過如大便行當即便與升麻湯服之恐癍子內陷以後臨時作罪過如癍子已出稠密身表熱急與下項黍黏子湯如癍子已出稠密身表熱急與此藥服之防後青乾黑陷黍黏子炒香當歸身酒洗炙甘草各一錢柴胡連翹黃耆黃芩各一錢五分地骨皮二錢上同為粗末每服二錢水一大盞煎至六分去渣溫服空腹服藥畢且休與乳食麻黃柴胡升麻湯治小兒寒鬱而喘喉鳴腹滿鼻流清涕脈沉急而數麻黃草豆蔻仁益智仁各一錢五分吳茱萸厚朴各二分當歸梢甘草柴胡生黃芩各一分升麻神麯蘇木各半分全蠍二個紅花少許上銼如麻豆大分作二服水一大盞煎至七分去渣食遠服忌風寒微有汗則效
