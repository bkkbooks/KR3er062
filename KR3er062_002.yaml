body:
  text: 卷中頭痛門頭痛論金匱真言論云東風生於春病在肝俞在頸項故春氣者病在頭又諸陽會於頭面如足太陽膀胱之脈起於目內眥上額交顛上入絡腦還出別下項病沖頭痛又足少陽膽之脈起於目銳眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客於經絡令人振寒頭痛身重惡寒治在風池風府調其陰陽不足則補有餘則瀉汗之則愈此傷寒頭痛也頭痛耳鳴九竅不利者腸胃之所生乃氣虛頭痛也心煩頭痛者病在膈中過在手巨陽少陰乃濕熱頭痛也如氣上不下頭痛癲疾者下虛上實也過在足少陰巨陽甚則入腎寒濕頭痛也如頭半邊痛者先取手少陽陽明後取足少陽陽明此偏頭痛也有真頭痛者甚則腦盡痛手足寒至節死不治有厥逆頭痛者所犯大寒內至骨髓髓者以腦為主腦逆故令頭痛齒亦痛凡頭痛皆以風藥治之者總其大體而言之也高巔之上惟風可到故味之薄者陰中之陽乃自地昇天者也然亦有三陰三陽之異故太陽頭痛惡風脈浮緊川芎羌活獨活麻黃之類為主少陽經頭痛脈弦細往來寒熱柴胡為主陽明頭痛自汗發熱惡寒脈浮緩長實者升麻葛根石膏白芷為主太陰頭痛必有痰體重或腹痛為痰癖其脈沉緩蒼朮半夏南星為主少陰經頭痛三陰三陽經不流行而足寒氣逆為寒厥其脈沉細麻黃附子細辛為主厥陰頭項痛或吐痰沫厥冷其脈浮緩吳茱萸湯主之血虛頭痛當歸川芎為主氣虛頭痛人參黃耆為主氣血俱虛頭痛調中益氣湯少加川芎蔓荊子細辛其效如神白朮半夏天麻湯治痰厥頭痛藥也青空膏乃風濕熱頭痛藥也羌活附子湯治厥陰頭痛藥也如濕氣在頭者以若吐之不可執方而治先師嘗病頭痛發時兩頰青黃暈眩目不欲開懶言身體沉重兀兀欲吐潔古曰此厥陰太陰合病名曰風痰以局方玉壺丸治之更灸俠谿穴即愈是知方者體也法者用也徒執體而不知用者弊體用不失可謂上工矣青空膏治偏正頭痛年深不愈者善療風濕熱頭上壅損目及腦痛不止川芎五錢柴胡七錢黃連炒防風去蘆羌活各一兩炙甘草一兩五錢細挺子黃芩三兩去皮銼一半酒製一半炒上為細末每服二錢匕於盞內入茶少許湯調如膏抹在口內少用白湯送下臨臥如苦頭痛每服加細辛二分如太陰脈緩有痰名曰痰厥頭痛減羌活防風川芎甘草加半夏一兩五錢如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡熱而渴此陽明頭痛只與白虎湯加好吳白芷徹清膏蔓荊子細辛各一分薄荷葉川芎各三分生甘草熟甘草各五分藁本一錢上為細末每服二錢食後茶清調下川芎散治頭目不清利川芎三分柴胡七分羌活防風藁本生甘草熟甘草升麻各一錢酒生地黃二錢酒黃連炒酒黃芩各四錢五分上為細末每服一錢或二三錢食後茶清調下忌酒濕面白芷散一名鬱金散治頭痛鬱金一錢香白芷石膏各二錢薄荷葉芒硝各三錢上為極細末口含水鼻內㗜之碧雲散治頭痛細辛鬱金芒硝各一錢蔓荊子川芎各一二分石膏一錢三分青黛一錢五分薄荷葉二錢紅豆一個上為極細末口噙水鼻內㗜之羌活清空膏蔓荊子一錢黃連三錢羌活防風甘草各四錢黃芩一兩上為細末每服一錢茶清調下食後臨臥清上瀉火湯昔有人年少時氣弱常於氣海三里灸之節次約五七十壯至年老添熱厥頭痛雖冬天大寒猶喜寒風其頭痛則愈微來暖處或見煙火其痛復作五七年不愈皆灸之過也荊芥穗川芎各二分蔓荊子當歸身蒼朮各三分酒黃連生地黃藁本甘草各五分升麻防風各七分酒黃柏炙甘草黃耆各一錢酒黃芩知母酒各錢半羌活三錢柴胡五錢細辛少許紅花少許上銼如麻豆大分作二服每服水二盞煎至一盞去渣稍熱服食後補氣湯服前藥之後服此藥柴胡二分升麻三分黃耆八分當歸身炙甘草各二錢紅花少許上㕮咀作二服水二盞煎至一盞去渣稍熱服食後細辛散治偏正頭痛細辛瓦粉各二分生黃芩芍藥各五分酒黃連川芎各七分酒黃芩一錢甘草炙一錢五柴胡二錢上為粗末每服三錢水一大盞半煎至一盞取清食後服之羌活湯治風熱壅盛上攻頭目昏眩炙甘草七分澤瀉三錢栝蔞根酒洗五錢羌活一兩白茯苓酒黃柏各五錢柴胡七錢防風細黃芩酒洗酒黃連各一兩上為粗末每服五錢重水二中盞煎至一盞取清食後臨臥通口熱服之養神湯治精神短不得睡項筋腫急難伸禁甘溫宜苦味木香橘皮柴胡各一分酒黃芩二分人參黃柏白朮川芎各三分升麻四分蒼朮麥蘖當歸身黃連各五分甘草半夏各七分黃耆一錢上㕮咀每服五錢水二大盞煎至一盞去渣稍熱服不拘時候安神湯治頭痛頭旋眼黑生甘草炙甘草各二錢防風二錢五分柴胡升麻酒生地黃酒知母各五錢黃耆二兩酒黃柏羌活各一兩上為粗末每服五錢水二大盞半煎至一盞半加蔓荊子五分川芎三分再煎至一盞去渣臨臥熱服半夏白朮天麻湯範天騋之內有脾胃證時顯煩躁胸中不利大便不通而又為寒氣怫鬱悶亂大作火不伸故也疑其有熱服疏風丸大便行其病不減恐其藥少再服七八十丸大便復見兩行元證不瘳增以吐逆食不能停痰唾稠黏湧出不止眼黑頭旋噁心煩悶氣短促上喘無力以言心神顛倒目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥余料前證是胃氣已損復下兩次則重虛其胃而痰厥頭痛作矣與此藥而治之黃柏二分酒洗乾薑三分澤瀉白茯苓天麻黃耆人參蒼朮各五分炒神麯白朮各一錢麥蘖面半夏湯洗橘皮各一錢五分上㕮咀每服五錢水二大盞煎至一盞去渣熱服食前一服而愈此頭痛苦甚謂之足太陰痰厥頭痛非半夏不能療眼黑頭旋風虛內作非天麻不能除黃耆甘溫瀉火補元氣實表虛止自汗人參甘溫瀉火補中益氣二術俱苦甘溫除濕補中益氣澤瀉茯苓利小便導濕橘皮苦溫益氣調中升陽神麯消食蕩胃中滯氣大麥面寬中助胃氣乾薑辛熱以滌中寒黃柏大苦寒酒洗以療冬天少火在泉發躁也口齒咽喉門口齒論論曰夫齒者腎之標口者脾之竅諸經多有會於口者其牙齒是手足陽明之所過上齦隸於坤土乃足陽明胃之脈貫絡也止而不動下齦嚼物動而不休手陽明大腸之脈所貫絡也手陽明惡寒飲而喜熱足陽明喜寒飲而惡熱其病不一牙者腎之標亦喜寒寒者堅牢為病不同熱甚則齒動齦齦袒脫作痛不已故所治療不同也有惡熱而作痛者有惡寒而作痛者有惡寒惡熱而作痛者有惡寒飲少熱飲多而作痛者有惡熱飲少寒飲多而作痛者有牙齒動搖而作痛者有齒齦腫起為痛者有脾胃中有風邪但覺風而作痛者又有牙上多為蟲所蝕其齒缺少而色變為蟲牙痛者有胃中氣少不能於寒袒露其齒作痛者有牙齒疼痛而穢臭之氣不可近者痛既不一豈可一藥而盡之哉羌活散治客寒犯腦風寒濕腦痛項筋急牙齒動搖肉齦袒脫疼痛藁本香白芷桂枝各三分蒼朮升麻各五分當歸身六分草豆蔻仁一個羌活一錢五分羊脛骨灰二錢麻黃去枝節防風各三錢柴胡五錢細辛少許上為細末先用溫水漱口淨擦之其痛立止也草豆蔻散治寒多熱少牙齒疼痛細辛葉防風各二分羊脛骨灰熟地黃各五分當歸六分草豆蔻仁黃連各一錢三分升麻二錢五分上為細末同前牙痛處擦之麻黃散治冬寒時分寒濕腦痛項筋急牙齒動搖疼痛防風藁本各三分羊脛骨灰當歸身熟地黃各六分草豆蔻仁升麻黃連各一錢羌活一錢五分麻黃不去節草龍膽酒洗生地黃各二錢細辛少許上為細末依前藥法擦之熱牙散一名麝香散治大熱牙齒瘴露根肉齦脫血出齒動欲落疼痛妨食忤涼少忤熱多熟地黃二分益智仁二分半當歸身生地黃麻黃根酒漢防己人參各三分升麻一錢草豆蔻黃連各一錢五分羊脛骨灰二錢麝香少許上為細末如前藥擦之治蟲散一名白芷散治大寒犯腦牙齒疼痛及蟲痛胃經濕熱腫痛桂枝一分熟地黃二分藁本白芷各三分當歸身益智仁黃連各四分羌活五分吳茱萸八分草豆蔻黃耆升麻各一錢羊脛骨灰二錢麻黃不去節二錢五分上為細末同前擦之益智木律散治寒熱牙痛木律二分當歸黃連各四分益智仁五分草豆蔻皮一錢二分熟地黃五分羊脛骨灰五分升麻一錢五分上為細末用度如前擦之如寒牙痛不用木律蠍梢散治大寒風犯腦牙痛白芷當歸身柴胡各二分桂枝升麻防風藁本黃耆各三分羌活五分草豆蔻皮一錢麻黃去節一錢五分蠍梢少許羊脛骨灰二錢五分上為細末如前法用之白牙散白芷七分升麻一錢羊脛骨灰二錢石膏一錢五分麝香少許上為細末先用溫水嗽口擦之妙刷牙藥麝香一分生地黃酒防己熟地各二分當歸身人參各三分草豆蔻皮五分升麻一錢羊脛骨灰黃連各二錢白豆蔻三錢草豆蔻三錢沒石子三個五倍子一個上為細末如前法擦之妙獨聖散治一切牙痛風疳北地蒺藜不拘多少陰乾上為細末每用刷牙以熱漿水漱牙外粗末熬漿水刷牙大有神效不可具述當歸龍膽散治寒熱停牙痛香白芷當歸梢羊脛骨灰生地各五分麻黃草豆蔻皮草龍膽升麻黃連各一錢上為細末如前法擦之神效牢牙地黃散治腦寒痛及牙痛藁本二分生地黃熟地黃羌活防己人參各三分益智仁歸身各四分香白芷黃耆各五分羊脛骨灰吳茱萸黃連麻黃各一錢草蔻皮一錢二分升麻一錢五分上為細末如前法擦之細辛散治寒邪風邪犯腦牙齒痛柴胡防風升麻白芷各二分桂枝二分半麻黃去節藁本蒼朮各三分當歸身四分草豆蔻五分羊脛骨灰羌活各錢五分細辛少許上為細末先漱後擦之佳立效散治牙齒痛不可忍及頭腦項背痛微惡寒飲大惡熱飲其脈上中下三部陽虛陰盛是五臟內盛六腑陽道微脈微小小便滑數細辛二分炙甘草三分升麻七分防風一錢草龍膽酒洗四錢上㕮咀都作一服水一盞煎至七分去渣以匙抄在口中炸痛處待少時則止如多惡熱飲更加草龍膽一錢此法不定隨寒熱多少臨時加減若更惡風作痛加草豆蔻黃連各五分勿加草龍膽牢牙散治牙齦肉綻有根牙疳腫痛牙動搖欲落牙齒不長牙黃口臭羌活一兩草龍膽酒洗一兩五錢羊脛骨灰二兩升麻一兩上為細末以紗羅子羅骨灰作微塵末和勻臥時貼在牙齦上清胃散治因服補胃熱藥致使上下牙痛疼不可忍牽引頭腦滿面發熱大痛足陽明之別絡入腦喜寒惡熱乃是手陽明經中熱盛而作也其齒喜冷惡熱當歸身揀細黃連夏月倍之生地黃酒製各三分牡丹皮五分升麻一錢上為細末都作一服水一盞半煎至一盞去渣帶冷服之神功丸治多食肉人口臭不可近牙齒疳蝕牙齦肉將脫牙齒落血不止蘭香葉如無用藿香葉代之當歸身木香各一錢升麻二錢生地黃酒洗生甘草各三錢黃連去須酒洗縮砂仁各五錢上同為細末湯浸𩚫餅為丸如綠豆大每服一百丸或加至二百丸止白湯下食遠服兼治血痢及血崩及血下不止血下褐色或紫色黑色及腸澼下血空心服米湯下其脈洪大而緩者及治麻木厥氣上衝逆氣上行妄聞妄見者桔梗湯治咽腫微覺痛聲破當歸身馬勃各一分白殭蠶黃芩各三分麻黃五分不去節桔梗甘草各一錢桂枝少許上為粗末作一服水二大盞煎至一盞去渣稍熱服之食後又方治口瘡久不愈者黃柏不計多少真者蜜塗其上炙黃色上為細末干糝瘡上臨臥忌醋醬鹽神驗法治口瘡無問久新夜間將二丸勒緊以左右手交揉三五十次但遇睡覺行之如此三五度因濕而生者一夜愈久病諸般口瘡三二夜愈如鼻流清涕者勒之二丸揉之數夜可愈內經云膀胱移熱於小腸膈腸不便上為口糜易老五苓散與導赤散合而飲之嘔吐門丁香茱萸湯治嘔吐噦胃虛寒所致黃柏三分炙甘草丁香柴胡橘皮各五分升麻七分吳茱萸蒼朮人參各一錢當歸身一錢五分草豆蔻仁黃耆各一錢上為粗末每服五錢水二大盞煎至一盞去渣稍熱服食前白朮湯一名茯苓半夏湯治胃氣虛弱身重有痰噁心欲吐是風邪羈絆於脾胃之間當先實其脾胃炒神麯二錢陳皮天麻各三錢白朮白茯苓麥蘖面炒黃色半夏各五錢上㕮咀每服五錢水二盞入生薑五片同煎至一盞去渣稍熱服之補肝湯一名柴胡半夏湯治素有風證不敢見風眼澀頭痛眼黑胸中有痰噁心兀兀欲吐遇風但覺皮肉緊手足難舉重物如居暖室少出微汗其證乃減再或遇風病即復柴胡升麻藁本各五分白茯苓七分炒神麯蒼朮各一錢半夏二錢生薑十片上為粗末都作一服水二大盞煎至一大盞去渣稍熱服吳茱萸丸一名木香利膈丸治寒在膈上噎塞咽膈不通木香青皮各二分白殭蠶薑黃澤瀉柴胡各四分當歸身甘草各六分炙益智仁人參橘皮升麻黃耆各八分半夏一錢草豆蔻仁吳茱萸各錢二分麥蘖面一錢五分上為細末湯浸蒸餅為丸如綠豆大每服二三十丸溫水送下勿多飲湯恐速下細嚼亦衄血吐血門麥門冬飲子治吐血久不愈以三稜針於氣街出血立愈黃耆一錢麥門冬當歸身生地黃人參各五分五味子十個上為粗末都作一服水二盞煎至一盞去渣熱服不拘時人參飲子治脾胃虛弱氣促氣弱精神短少衄血吐血麥門冬二分人參去蘆當歸身各三分黃耆白芍藥甘草各一錢五味子五個上為粗末都作一服用水二盞煎至一盞去渣稍熱服一貧者有前證以前藥投之愈繼而至冬天居曠室中臥大熱炕而吐血數次再來求治料此病久虛弱附臍有形而有火熱在內上氣不足陽氣外虛當補表之陽氣瀉其里之虛熱是其法也冬天居曠室衣蓋單薄是重虛其陽表有大寒壅遏裡熱火邪不得舒伸故血出於口憶仲景傷寒論中一證太陽傷寒當以麻黃湯發汗而不與之遂成衄卻與麻黃湯立愈此法相同予遂用之三黃補血湯治六脈俱大按之空虛心動面赤善驚上熱乃手少陰心脈也此氣盛多而亡血以甘寒鎮墜之劑大瀉其氣以墜氣浮以甘辛溫微苦峻補其血牡丹皮黃耆升麻各一錢當歸柴胡各一錢五分熟地黃川芎各二錢生地黃三錢白芍藥五錢上㕮咀如麻豆大每服五錢水二大盞煎至一大盞去渣稍熱服食前如兩寸脈芤血在上焦或衄血或嘔血與犀角地黃湯則愈救脈湯一名人參救肺散治吐血甘草蘇木陳皮各五分升麻柴胡蒼朮各一錢當歸梢熟地黃白芍藥黃耆人參各二錢上為粗末都作一服水二大盞煎至一盞去渣稍溫食前服麻黃桂枝湯人參益上焦元氣不足而實其表也麥冬保肺氣各三分桂枝以補表虛當歸身和血養血各五分甘草補其脾胃之虛麻黃去根節黃耆實表益衛白芍藥各一錢五味子五個安其脈氣上以水三盞先煮麻黃一味令沸去沫至二盞入余藥同煎至一盞去渣熱服臨臥只一服而愈更不再作黃耆芍藥湯治鼻衄血多面黃眼澀多眵手麻木葛根羌活各五錢升麻一兩炙甘草二兩白芍藥黃耆各三兩上㕮咀每服五錢水二盞煎至一盞食後六脈弦細而澀按之空虛其色必白而天不澤者脫血也此大寒證以辛溫補血益血以甘溫甘熱滑潤之劑以佐之則愈此亡血亦傷精氣止衄血法治鼻血久不止素有熱而暴作者諸藥無驗神法以大紙一張作八折或十折於水內濕置頂中以熱熨斗熨至一重或二重紙干立止腰痛門川芎肉桂湯丁未冬曹通甫自河南來有役人小翟露宿寒濕之地腰痛不能轉側兩脅搐急作痛已經月餘不愈矣腰痛論中說皆為足太陽足少陰血絡中有凝血作痛間有一二證屬少陽膽經外絡脈病皆去血絡之凝乃愈其內經有云冬三月禁不得用針只宜服藥通其經絡破其血絡中敗血以此藥主之酒漢防己防風各三分炒神麯獨活各五分川芎柴胡肉桂當歸梢炙甘草蒼朮各一錢桃仁五個去皮尖羌活一錢五分上㕮咀都作一服好酒三大盞煎至一大盞去渣稍熱食遠服獨活湯治因勞役腰痛如折沉重如山炙甘草二錢羌活防風獨活大黃煨澤瀉肉桂各三錢當歸梢連翹各五錢酒漢防己酒黃柏各一兩桃仁三十個上㕮咀每服五錢酒半盞水一大盞半煎至一盞去渣熱服破血散疼湯治乘馬損傷跌其脊骨惡血流於脅下其痛苦楚不能轉側妨於飲食羌活防風中桂各一錢蘇木一錢五分連翹當歸梢柴胡各二錢麝香少許另研水蛭三錢炒去煙盡另研上件分作二服每服酒二大盞水一大盞除水蛭麝香另研如泥煎余藥作一大盞去渣上火令稍熱調二味空心服之兩服立愈地龍散治腰脊痛或打撲損傷從高墜下惡血在太陽經中令人腰脊痛或脛腨臂股中痛不可忍鼻塞不通當歸梢一分中桂地龍各四分麻黃五分蘇木六分獨活黃柏甘草各一錢羌活二錢桃仁六個上㕮咀每服五錢水二盞煎至一盞去渣溫服食蒼朮湯治濕熱腰腿疼痛防風風能勝濕黃柏各一錢始得之時寒也久不愈寒化為熱除濕止痛柴胡二錢行經蒼朮三錢去濕止痛上都作一服水二大盞煎至一盞去渣空心服麻黃復煎散治陰室中汗出懶語四肢困倦無力走注疼痛乃下焦伏火而不得伸浮而躁熱汗出一身盡痛蓋風濕相搏也以升陽發汗漸漸發之火鬱及濕在經者亦宜發汗況正值季春之月脈緩而遲尤宜發汗令風濕去而陽升以此困倦乃退氣血俱得生旺也白朮人參生地黃柴胡防風各五分羌活黃柏各一錢麻黃去節微搗不令作末水五大盞煎令沸去沫煎至二盞入下項藥再煎黃耆各二錢甘草三錢杏仁三個去皮上㕮咀都作一服入麻黃湯煎至一盞臨臥服之勿令食飽取漸次有汗則效緩筋湯一名羌活湯治兩目如火腫痛兩足及伏兔筋骨痛膝少力身重腰痛夜惡寒痰嗽頸項皆急痛目外眵目絲急食不下熟地黃二分生甘草柴胡紅花炙甘草蘇木獨活各二分藁本升麻黃芩草豆蔻仁酒黃柏生地黃當歸身麻黃各三分羌活三錢蒼朮五分上為粗末都作一服水二大盞煎至一盞去渣食遠服之拈痛湯治濕熱為病肩背沉重肢節疼痛胸膈不利白朮五分人參去蘆苦參酒炒升麻去蘆葛根蒼朮各二錢防風去蘆知母酒洗澤瀉黃芩炒豬苓歸身各三錢炙甘草黃芩酒洗茵陳酒炒羌活各五錢上㕮咀每服一兩水二大盞煎至一盞去渣食遠服蒼朮復煎散治寒濕相合腦右痛惡寒項筋脊骨強肩背胛眼痛膝臏痛無力行步沉重紅花一分黃柏三分柴胡藁本澤瀉白朮升麻各五分羌活一錢蒼朮四兩水二碗煎二盞去渣入藥上㕮咀先煎蒼朮湯二大盞復煎前項藥至一大盞稍熱空心服取微汗為效忌酒濕面羌活蒼朮湯治腳膝無力沉重炙甘草黃柏草豆蔻生甘草葛根各五分橘皮六分柴胡七分半升麻獨活縮砂仁蒼朮各一錢防風一錢五分黃耆二錢知母二錢五分羌活三錢上㕮咀分作二服水二大盞煎至一盞去渣空心服婦人門經閉不行有三論陰陽別論云二陽之病發心脾有不得隱曲女子不月其傳為風消為息賁者死不治婦人脾胃久虛或形嬴氣血俱衰而致經水斷絕不行或病中消胃熱善食漸瘦津液不生夫經者血脈津液所化津液既絕為熱所爍肌肉消瘦時見渴躁血海枯竭病名曰血枯經絕宜瀉胃之燥熱補益氣血經自行矣此證或經適行而有子子不安為胎病者有矣或心包脈洪數躁作時見大便秘澀小便雖清不利而經水閉絕不行此乃血海乾枯宜調血脈除包絡中火邪而經自行矣內經所謂小腸移熱於大腸為癥瘕為沉脈澀不利則月事沉滯而不利故云為癥瘕為沉也或因勞心心火上行月事不來安心和血瀉火經自行矣故內經云月事不來者胞脈閉也胞脈者屬心而絡於胞中令氣上迫肺心氣不得下故月事不來也經漏不止有二論陰陽別論云陰虛陽搏謂之崩婦人脾胃虛損致命門脈沉細而數疾或沉弦而洪大有力寸關脈亦然皆由脾胃有虧下陷於腎與相火相合濕熱下迫經漏不止其色紫黑如夏月腐肉之臭中有白帶者脈必弦細寒作於中中有赤帶者其脈洪數疾熱明矣必腰痛或臍下痛臨經欲行先見寒熱往來兩脅急縮兼脾胃證出見或四肢困熱心煩不得眠臥心下急宜大補脾胃而升舉血氣可一服而愈或人故貴脫勢人事疏少或先富後貧心氣不足其火大熾旺於血脈之中又致脾胃飲食失節火乘其中形質肌肉容顏似不病者此心病也不形於診故脾胃飲食不調其證顯矣而經水不時而下或適來適斷暴下不止治當先說惡死之言勸諭令歡死而心不動以大補氣血之藥養脾胃微加鎮墜心火之藥治其心補陰瀉陽經自止矣痿論云悲哀太甚則胞絡絕也陽氣內動發則心下崩數溲血也故本病曰大經空虛發則肌痹傳為脈痿此之謂也升陽除濕湯一名調經升麻除濕湯治女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食不節或勞傷形體或素有心氣不足因飲食勞倦致令心火乘脾其人必怠惰嗜臥四肢不收困倦乏力無氣以動氣短上氣逆急上衝其脈緩而弦急按之洪大皆中指下得之脾土受邪也脾主滋榮周身者也心主血血主脈二者受邪病皆在脈脈者血之府也脈者人之神也心不主令包絡代之故曰心之脈主屬心系心系者包絡命門之脈也主月事因脾胃虛而心包乘之故漏下月事不調也況脾胃為血氣陰陽之根蒂也當除濕去熱益風氣土伸以勝其濕又云火鬱則發之當歸酒洗獨活各五分蔓荊子七分防風炙甘草升麻藁本各一錢柴胡羌活藁本黃耆各一錢五分上銼如麻豆大勿令作末都作一服以潔淨新汲水三大盞煎至一大盞去渣空心熱服待少時以早飯壓之可一服而已如灸足太陰脾經中血海穴二七壯亦已此藥乃從權之法用風勝濕為胃下陷而氣迫於下以救其血之暴崩也並血惡之物住後必須黃耆人參炙甘草當歸之類數服以補之於補氣升陽湯中加以和血藥便是也若經血惡物下之不絕尤宜究其根源治其本經只益脾胃退心火之亢乃治其根蒂也若遇夏月白帶下脫漏不止宜用此湯一服立止涼血地黃湯治婦人血崩是腎水陰虛不能鎮守包絡相火故血走而崩也黃芩荊芥穗蔓荊子各一錢黃柏知母藁本細辛川芎各二分黃連羌活柴胡升麻防風各三分生地黃當歸各五分甘草一錢紅花少許上㕮咀都作一服水三大盞煎至一盞去渣稍熱空心服之足太陰脾之經中血海二穴在膝臏上內臁白肉際二寸中治女子漏下惡血月事不調逆氣腹脹其脈緩者是也灸三壯足少陰腎之經中陰谷二穴在膝內輔骨後大筋下小筋上按之應手屈膝取之治膝如錐不得屈伸舌縱涎下煩逆溺難少腹急引陰痛股內臁痛婦人漏血不止腹脹滿不得息小便黃如蠱女子如妊身可灸二壯酒煮當歸丸治癲疝白帶下疰腳氣腰以下如在冰雪中以火焙炕重重厚綿衣蓋其上猶寒冷不任寒之極也面白如枯魚之象肌肉如刀割削瘦峻之速也小便不止與白帶長流而不禁固自不知覺面白目青藍如菜色目䀮䀮無所見身重如山行步欹側不能安地腿膝枯細大便難秘口不能言無力之極食不下心下痞煩心懊憹不任其苦面停垢背惡寒小便遺而不知此上中下三陽真氣俱虛欲竭噦嘔不止胃虛之極也脈沉厥緊而澀按之空虛若脈洪大而澀按之無力猶為中寒之證況按之空虛者乎按之不鼓是為陰寒乃氣血俱虛之極也茴香五錢黑附子炮製去皮臍良薑各七錢當歸一兩上四味銼如麻豆大以上等好酒一升半同煮至酒盡焙乾炙甘草苦楝生用丁香各五錢木香升麻各一錢柴胡二錢炒黃鹽全蠍各三錢延胡索四錢上與前四味藥同為細末酒煮麵糊為丸如梧桐子大每服五七十丸空心淡醋湯下忌油膩冷物酒濕面固真丸治白帶久下不止臍腹冷痛陰中亦然目中溜火視物䀮䀮然無所見齒皆惡熱飲痛須得黃連細末擦之乃止惟喜干食大惡湯飲此病皆寒濕乘其胞內故喜干而惡濕肝經陰火上溢走於標故上壅而目中溜火腎水侵肝而上溢致目䀮䀮而無所見齒惡熱飲者是陽明經中伏火也治法當大瀉寒濕以丸藥治之故曰寒在下焦治宜緩大忌湯散以酒製白石脂白龍骨以枯其濕炮乾薑大熱辛瀉寒水以黃柏之大寒為因用又為鄉導故云古者雖有重罪不絕人之後又為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥五分導之恐辛熱之藥大甚損其肝經故微瀉之以當歸身之辛溫大和其血脈此用藥之法備矣黃柏酒洗白芍藥各五分柴胡白石脂各一錢火燒赤水飛細研日乾白龍骨酒煮日乾水飛為末當歸酒洗各二錢乾薑四錢炮上件除龍骨白石脂水飛研外同為細末水煮麵糊為丸如雞頭仁大日乾空心多用白沸湯下無令胃中停滯待少時以早飯壓之是不令熱藥犯胃忌生冷硬物酒濕面烏藥湯治婦人血海疼痛當歸甘草木香各五錢烏藥一兩香附子二兩炒上㕮咀每服五錢水二大盞去渣溫服食前助陽湯一名升陽燥濕湯治白帶下陰戶中痛控心而急痛身黃皮緩身重如山陰中如冰生黃芩橘皮各五分防風高良薑乾薑郁李仁甘草各一錢柴胡一錢三分白葵花七朵上銼如麻豆大分作二服每服水二大盞煎至一盞去渣食前稍熱服水府丹治婦人久虛積冷經候不行癥瘕癖塊腹中暴痛面有䵟𩿪黎黑羸瘠硇砂紙隔沸湯淋熬取紅豆各五錢桂心另為末木香乾薑各一兩砂仁二兩經煅花蕊石研一兩五錢斑蝥一百個去頭翅生地黃汁童子小便各一升臘月狗膽七枚芫蜻三百個去頭足糯米升炒米黃去米不用上九味為細末同三汁熬為膏和丸如雞頭大硃砂為衣每服一丸溫酒細嚼食前服米飲亦可孕婦不可服丁香膠艾湯治崩漏不止蓋心氣不足勞役及飲食不節所得經隔少時其脈二尺俱弦緊洪按之無力其證自覺臍下如冰求厚衣被以御其寒白帶白滑之物多間有如屋漏水下時有鮮血石尺脈時微洪也熟地黃白芍藥各三分川芎丁香各四分阿膠六分生艾葉一錢當歸一錢二分上川芎為細末當歸酒洗銼熟地黃丁香為細末艾亦銼都作一服水二大盞先煎五味作一盞零二分去渣入膠再上火煎至一大盞帶熱空心服之黃耆當歸人參湯丁未仲冬郭大方來說其妻經水暴崩不止先曾損身失血自後一次縮一十日而來今次不止其人心窄性急多驚以予料之必因心氣不足飲食不節得之大方曰無到彼診得掌中寒脈沉細而緩間而沉數九竅微有不利四肢無力上喘氣短促口鼻氣皆不調果有心氣不足脾胃虛弱之證胃脘當心而痛左脅下縮急有積當臍有動氣腹中鳴下氣大便難虛證極多不能盡錄擬先治其本餘證可以皆去安心定志鎮墜其經調和脾胃大益元氣補其血脈令養其神以大熱之劑去其冬寒凝在皮膚內少加生地黃去命門相火不令四肢痿弱黃連一分生地黃三分炒神麯橘皮桂枝各五分草豆蔻仁六分黃耆人參麻黃不去節各一錢當歸身一錢五分杏仁五個另研如泥上㕮咀作二服水二大盞半煎麻黃令沸去渣煎至二盞入諸藥同煎至一大盞於巳午之間食消盡服之一服立止其胃脘痛乃胃上有客寒與大熱藥草豆蔻丸一十五丸白湯送下其痛立止再與肝之積藥除其積之根源而愈當歸芍藥湯治婦人經脈漏下不止其色鮮紅時值七月處暑之間先因勞役脾胃虛弱氣短氣逆自汗不止身熱悶亂惡見飲食非惟不入亦不思食沉懶困倦四肢無力大便時瀉後再因心氣不足經脈再下不止惟覺氣下脫其元氣逆上全無惟覺心腹中氣下行氣短少不能言是無力以言非懶語也此藥主之柴胡二分炙甘草生地黃各三分橘皮不去白熟地黃各五分黃耆一錢五分蒼朮泔浸去皮當歸身白芍藥白朮各二錢上十味㕮咀如麻豆大分作二服水二盞半煎至一盞去渣稍熱空心服之柴胡調經湯治經水不止鮮紅項筋急腦痛脊骨強痛炙甘草當歸身葛根各三分獨活藁本升麻各五分柴胡七分羌活蒼朮各一錢紅花少許上銼如麻豆大都作一服水四大盞煎至一盞去渣空心稍熱服取微汗立止一婦人經候凝結黑血成塊左廂有血瘕水泄不止谷有時不化後血塊暴下並水俱作是前後二陰有形血脫竭於下既久經候猶不調水泄日見三兩行食罷煩心飲食減少甚至瘦弱東垣老人曰夫聖人治病必本四時升降浮沉之理權變之宜必先歲氣無伐天和無盛無虛遺人夭殃無致邪無失正絕人長命故仲景云陽盛陰虛下之則愈汗之則死陰盛陽虛汗之即愈下之即死大抵聖人立法且如升陽或發散之劑是助春夏之陽氣令其上升乃瀉秋冬收藏殞殺寒涼之氣此病是也當用此法治之升降浮沉之至理也天地之氣以升降浮沉乃從四時如治病不可逆之故經云順天則昌逆天則亡可不畏哉夫人之身亦有四時天地之氣不可止認在外人亦體同天地也今經漏不止是前陰之氣血已脫下矣水泄又數年是後陰之氣血下陷以脫矣後陰者主有形之物也前陰者精氣之戶下竭是病人周身之血氣常行秋冬之令陰主殺此等收藏之病是也陽生陰長春夏是也在人之身令氣升浮者穀氣上行是也既病人周身血氣皆不生長谷氣又不勝其肌肉消少是兩儀之氣俱將絕矣既下元二陰俱脫血氣將竭假令當是熱證令下焦久脫化為寒矣此病久沉久降寒濕大勝當急救之瀉寒以熱除濕以燥大升大舉以助生長補養氣血不致偏竭聖人立治之法既濕氣大勝以所勝治之助甲風木上升是也故經云風勝濕是以所勝平之也當先調和胃氣次用白朮之類以燥其濕而滋元氣如其不止後用風藥以勝濕此便是大舉大升以助春夏二濕之久陷下之至治也益胃升陽湯血脫益氣古聖人之法也先補胃氣以助生髮之氣故曰陽生陰長諸甘藥為之先務舉世皆以為補殊不知甘能生血此陽生陰長之理也故先理胃氣人之身內胃氣為寶柴胡升麻各五分炙甘草當歸身酒洗陳皮各一錢人參去蘆有嗽去之炒神麯各一錢五分黃耆二錢白朮三錢生黃芩少許上㕮咀每服二錢水二大盞煎至一盞去渣稍熱服如腹中痛每服加白芍藥三分中桂少許如渴或口乾加葛根二分不拘時候升陽舉經湯治經水不止如右尺脈控之空虛是氣血俱脫大寒之證輕手其脈數疾舉指弦緊或澀皆陽脫之證陰火亦亡見熱證於口鼻眼或渴此皆陰躁陽欲先去也當溫之舉之升之浮之燥之此法當大升浮血氣切補命門之下脫也肉桂去皮盛夏勿用秋冬用白芍藥紅花各五分細辛六分人參去蘆熟地黃川芎各一錢獨活根黑附子炮製去皮臍炙甘草各一錢五分羌活藁本去土防風各二錢白朮當歸黃耆柴胡各三錢桃仁十個湯浸去皮尖細研上㕮咀每服三錢若病勢順當漸加至五錢每服水三盞煎至一盞空心熱服半產誤用寒涼之藥論婦人分娩及半產漏下昏冒不省瞑目無所知覺蓋因血暴亡有形血去則心神無所養心與包絡者君火相火也得血則安亡血則危火上熾故令人昏冒火勝其肺瞑目不省人事是陰血暴去不能鎮撫也血已虧損往往用滑石甘草石膏之類乃辛甘大寒之藥能瀉氣中之熱是血虧瀉氣乃陰虧瀉陽使二者俱傷反為不足虛勞之病昏迷不省者上焦心肺之熱也此無形之熱用寒涼之藥驅令下行豈不知上焦之病悉屬於表乃陰證也汗之則愈今反下之幸而不死暴虧氣血生命豈能久活又不知內經有說病氣不足宜補不宜瀉但瞑目之病悉屬於陰宜汗不宜下又不知傷寒鬱冒得汗則愈是禁用寒涼藥也分娩半產本氣不病是暴去其血亡血補血又何疑焉補其血則神昌常時血下降亡今當補而升舉之心得血而養神不昏矣血若暴下是秋冬之令大旺今舉而升之以助其陽則目張神不昏迷矣今立一方補血養血生血益陽以補手足厥陰之不足也全生活血湯紅花三分蔓荊子細辛各五分生地黃夏月多加之熟地黃各一錢藁本川芎各一錢五分防風諸陽既陷何以知之血下脫故也羌活獨活炙甘草柴胡去苗當歸身酒洗葛根各二錢白芍藥升麻各三錢上㕮咀每服五錢水二盞煎至一盞去渣食前稍熱服當歸附子湯治臍下冷痛赤白帶下當歸二分炒鹽三分蠍梢升麻各五分甘草六分柴胡七分黃柏少許為引用附子一錢乾薑良薑各一錢上為粗末每服五錢水五盞煎至一盞去渣稍熱服或為細末酒麵糊為丸亦可調經補真湯冬後一月微有地泥冰泮其白帶再來陰戶中寒一服立止獨活乾薑炮藁本防風蒼朮各二分麻黃不去節炙甘草人參去蘆當歸身白朮生黃芩升麻各五分黃耆七分良薑澤瀉羌活各一錢柴胡四錢杏仁二個桂枝少許白葵花七朵去萼上㕮咀除黃芩麻黃各另外都作一服先以水三大盞半煎麻黃一味令沸掠去沫入余藥同煎至一盞零七分再入生黃芩煎至一盞空心服之候一時許可食早飯坐藥龍鹽膏茴香三分枯礬五分良薑當歸梢酒防己木通各一錢丁香木香川烏炮各一錢五分龍骨炒鹽紅豆肉桂各二錢厚朴三錢延胡索五錢全蠍五個上為細末煉蜜為丸如彈子大綿裹留絲在外內丸藥陰戶內日易之勝陰丹為上藥力小再取三錢內加行性熱藥項下柴胡羌活枯白礬甘松升麻各二分川烏頭大椒三柰子各五分蒜七分破故紙八分與蒜同煮焙乾秤全蠍三個麝香少許上為細末依前法用回陽丹羌活全蠍升麻根甘松各二分草烏頭水蛭炒各三分大椒三柰子蓽茇枯礬各五分柴胡川烏各七分炒黃鹽為必用之藥去之則不效破故紙蒜各一錢虻蟲三個去翅足炒上為極細末依前制用臍下覺暖為效柴胡丁香湯治婦人年三十歲臨經先腰臍痛甚則腹中亦痛經縮三兩日生地黃二分丁香四分當歸身防風羌活各一錢柴胡一錢五分全蠍一個上件都作一服水二盞煎至一盞去渣食前稍熱服延胡苦楝湯治臍下冷撮痛陰冷大寒白帶下黃柏一分為引用延胡索苦楝子各二分附子炮肉桂各三分炙甘草五分熟地黃一錢上都作一服水二大盞煎至一盞食前服桂附湯治白帶腥臭多悲不樂大寒黃柏為引用知母各五分肉桂一錢附子三錢上㕮咀都作一服水二盞煎至一盞去渣食遠熱服如少食常飽有時似腹脹夯悶加白芍藥五分如不思飲食加五味子二十個如煩惱面上如蟲行乃胃中元氣極虛加黃耆一錢五分人參七分炙甘草升麻各五分人參補氣湯治四肢懶倦自汗無力丁香末二分生甘草梢炙甘草各三分生地黃白芍藥各五分熟地黃六分人參防風羌活黃柏知母當歸身升麻各七分柴胡一錢黃耆一錢五分全蠍一個五味子二十個上銼如麻豆大都作一服水二盞煎至一盞去渣空心稍熱服黃耆白朮湯治婦人四肢沉重自汗上至頭際頸而述惡風頭痛躁熱細辛三分吳茱萸川芎各五分柴胡升麻各一錢當歸身一錢五分黃柏酒洗炙甘草羌活各二錢五味子三錢白朮人參各五錢黃耆一兩上㕮咀每服五錢水二大盞生薑五片煎至一盞去渣食前熱服如腹中痛不快加炙甘草一錢汗出不止加黃柏一錢白朮茯苓湯治胃氣弱身重有痰噁心欲吐是風邪羈絆於脾胃之間當先實其脾胃白朮白茯苓半夏各一兩炒曲二錢麥蘖面五分炒上㕮咀每服五錢水二大盞入生薑五片煎至一盞去渣不拘時服增味四物湯治婦人血積當歸川芎芍藥熟地黃京三稜乾漆炒燥煙盡肉桂去皮廣朮各等分上為粗末每服五錢水二大盞煎至一盞去渣食前稍熱服補經固真湯白文舉正室白帶常漏久矣諸藥不效診得心包尺脈微其白帶下流不止叔和云崩中日久為白帶漏下多時血水枯言崩中者始病血崩久則血少復亡其陽故白滑之物下流不止是本經血海將枯津液復亡枯乾不能滋養筋骨以本經行經藥為引用為使以大辛甘油膩之藥潤其枯燥而滋益津液以大辛熱之氣味藥補其陽道生其血脈以苦寒之藥泄其肺而救上熱傷氣以人參補之以微苦溫之藥為佐而益元氣白葵花去萼研爛四分甘草炙郁李仁去皮尖研泥柴胡各一錢乾薑細末人參各二錢生黃芩細研一錢陳皮留皮五分上件除黃芩外以水三盞煎至一盞七分再入黃芩同煎至一盞去渣空心熱服少時以早飯壓之溫衛補血湯治耳鳴鼻不聞香臭口不知穀味氣不快四肢困倦行步欹側發脫落食不下膝冷陰汗帶下喉中吤吤不得臥口舌益干太息頭不可以回顧項筋緊脊強痛頭旋眼黑頭痛欠嚏生地黃白朮藿香黃柏各一分牡丹皮蒼朮王瓜根橘皮吳茱萸各二分當歸身二分半柴胡人參熟甘草地骨皮各三分升麻四分生甘草五分黃耆一錢二分丁香一個桃仁三個葵花七朵上㕮咀作一服用水二大盞煎至一盞去渣食前熱服立效散治婦人血崩不止當歸蓮花心白綿子紅花茅花各一兩上銼如豆大白紙裹定泥固炭火燒灰存性為細末如干血氣研血竭為引好溫酒調服加輕粉一錢如血崩不止加麝香為引好溫酒調服四聖散治婦人赤白帶下川烏炮製生白礬各一錢紅娘子三個斑蝥十個煉蜜為丸如皂子大綿裹坐之溫經除濕湯十月霜冷後四肢無力乃痿厥濕熱在下焦也醋心者是濁氣不下降欲為滿也閤眼麻木作者陽道不行也惡風寒者上焦之分皮膚中氣不行也開目不麻者目開助陽道故陰寒之氣少退也頭旋眩暈者風氣下陷於血分不得伸越而作也近火則有之黃連一分柴胡草豆蔻神麯炒木香各二分麻黃不去節獨活當歸身黃柏各一分升麻五分羌活七分炙甘草人參白朮豬苓澤瀉各一錢黃耆橘皮蒼朮各二錢白芍藥三錢上銼如麻豆大分作二服水二盞煎至一盞食遠服治支節沉重疼痛無力之勝藥也補氣升陽和中湯李正臣夫人病診得六脈中俱得弦洪緩相合按之無力弦在上是風熱下陷入陰中陽道不行其證閉目則渾身麻木晝減而夜甚覺而開目則麻木漸退久則絕止常開其目此證不作懼其麻木不敢閤眼致不得眠身體皆重時有痰嗽覺胸中常似有痰而不利時煩躁氣短促而喘肌膚充盛飲食不減大小便如常惟畏其麻木不敢閤眼為最苦觀其色脈形病相應而不逆內經曰陽盛瞑目而動輕陰病閉目而靜重又云諸脈皆屬於目靈樞經云閉目則陽道行陽氣遍布周身閉目則陽道閉而不行如晝夜之分知其陽衰而陰旺也且麻木為風三尺之童皆以為然細校之則有區別耳久坐而起亦有麻木為如繩縛之久釋之覺麻作而不敢動良久則自已以此驗之非有風邪乃氣不行主治之當補其肺中之氣則麻木自去矣如經脈中陰火乘其陽分火動於中為麻木也當兼去其陰火則愈矣時痰嗽者秋涼在外在上而作也當以溫劑實其皮毛身重脈緩者濕氣伏匿而作也時見躁作當升陽助氣益血微瀉陰火與濕通行經脈調其陰陽則已矣非五臟六腑之本有邪也此藥主之生甘草去腎熱酒黃柏瀉火除濕白茯苓除濕導火澤瀉除濕導火升麻行陽助經柴胡各一錢蒼朮除濕補中草豆蔻仁益陽退外寒各一錢五分橘皮當歸身白朮各二錢白芍藥人參各三錢佛耳草炙甘草各四錢黃耆五錢上㕮咀每服五錢水二盞煎至一盞去渣食遠服之麻黃桂枝升麻湯治婦人先患渾身麻木睡覺則少減開目則已而全愈又證已痊又因心中煩惱遍身骨節疼身體沉重飲食減少腹中氣不運轉木香生薑各一分桂枝半夏陳皮草豆蔻仁厚朴黑附子黃柏各二分炙甘草升麻白朮茯苓澤瀉各三分黃耆麻黃不去節人參各五分上都作一服水二盞煎至一盞去渣食遠服之
